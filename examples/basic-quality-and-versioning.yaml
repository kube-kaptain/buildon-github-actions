#
# Basic Quality and Versioning
#
# Quality checks plus automatic version tagging. PRs get quality enforcement,
# merges to main get a version tag pushed. The standard foundation for most
# projects.
#
# All configuration is in KaptainPM.yaml - see docs for available fields.

name: Basic Quality and Versioning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/basic-quality-and-versioning.yaml@1.1.14
    permissions:
      contents: write
      packages: write
      checks: write
