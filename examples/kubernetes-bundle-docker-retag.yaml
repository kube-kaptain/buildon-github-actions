#
# Kubernetes Bundle - Docker Retag
#
# Packages Kubernetes manifests and retags an upstream Docker image for
# third-party stacks whose hard-coded refs can't be made to fit Kaptain's
# naming conventions.
#
# Kaptain manifest generators don't run automatically in this process.
#
# All configuration is in KaptainPM.yaml - see docs for available fields.

name: Kubernetes Bundle - Docker Retag

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/kubernetes-bundle-docker-retag.yaml@1.1.38
    permissions:
      contents: write
      packages: write
      checks: write
