#
# Kubernetes Product Aggregate
#
# Aggregates pre-built manifest bundles listed in spec.contents into a
# deployable product, with merged defaults and a unified contract.
#
# All configuration is in KaptainPM.yaml - see docs for available fields.

name: Kubernetes Product Aggregate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/kubernetes-product-aggregate.yaml@1.1.48
    permissions:
      contents: write
      packages: write
      checks: write
    # Override the default runner if needed:
    # with:
    #   runner: ubuntu-latest
