#
# Spec Check Filter Release
#
# Validates and packages spec/schema files as OCI artifacts. Used for publishing
# versioned specifications that other projects consume as layers.
#
# All configuration is in KaptainPM.yaml - see docs for available fields.

name: Spec Check Filter Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/spec-check-filter-release.yaml@1.1.4
    permissions:
      contents: write
      packages: write
      checks: write
