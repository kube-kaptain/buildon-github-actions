#
# Kubernetes App - Manifests Only
#
# Packages Kubernetes manifests without building a Docker image. Use when
# deploying an externally-built image or when manifests reference an image
# built elsewhere. Configure externalImage in KaptainPM.yaml to substitute
# image references.
#
# All configuration is in KaptainPM.yaml - see docs for available fields.

name: Kubernetes App - Manifests Only

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/kubernetes-app-manifests-only.yaml@1.1.5
    permissions:
      contents: write
      packages: write
      checks: write
