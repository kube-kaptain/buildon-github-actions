apiVersion: kaptain.org/1.16
kind: docker-build-dockerfile

spec:
  global:
    release:
      versioning:
        strategy: file-pattern-match
        patternType: dockerfile-env-kubectl
        sourceOne:
          subPath: src/docker
          fileName: Dockerfile
