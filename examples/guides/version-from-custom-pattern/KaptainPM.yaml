apiVersion: kaptain.org/v1
kind: basic-quality-and-versioning

spec:
  global:
    release:
      versioning:
        strategy: file-pattern-match
        patternType: custom
        sourceOne:
          subPath: .
          fileName: version.txt
          pattern: '^([0-9]+\.[0-9]+\.[0-9]+)$'
