apiVersion: kaptain.org/v1
kind: kubernetes-app-docker-dockerfile

spec:
  main:
    generators:
      common:
        additionalLabels: team=platform
        additionalAnnotations: owner=platform-team
      workload:
        type: deployment
        replicas: 3
        revisionHistoryLimit: 5
        container:
          port: 8080
          readonlyRootFilesystem: true
      service:
        enabled: true
      serviceAccount:
        generation:
          enabled: true
