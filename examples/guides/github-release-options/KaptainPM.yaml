apiVersion: kaptain.org/1.16
kind: basic-quality-and-versioning

spec:
  main:
    release:
      github:
        enabled: true
        substitutedFiles: dist/output.txt
        verbatimFiles: CHANGELOG.md,LICENSE
        notes: ''
        addVersionToFilenames: true
