apiVersion: kaptain.org/1.16
kind: kubernetes-app-manifests-only

spec:
  main:
    externalImage:
      name: my-org/my-app
      tag: '2.1.0'
    generators:
      workload:
        type: deployment
        replicas: 2
        container:
          port: 8080
