# Kubernetes App - Docker Dockerfile
#
# Full Kubernetes application pipeline. Builds Docker image from Dockerfile,
# generates Kubernetes manifests, packages everything as OCI artifacts. The
# complete build-to-deploy pipeline.
#
# All configuration is in KaptainPM.yaml - see docs for available fields.

name: Kubernetes App - Docker Dockerfile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/kubernetes-app-docker-dockerfile.yaml@1.1.8
    permissions:
      contents: write
      packages: write
      checks: write
