#
# Basic Quality Checks
#
# Enforces branch naming, commit message, and branch structure standards on PRs.
# No versioning, no docker, no releases - just quality gates.
#
# All configuration is in KaptainPM.yaml - see docs for available fields.

name: Basic Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/basic-quality-checks.yaml@1.1.1
    permissions:
      checks: write
