# Kubernetes Bundle - Vendor Helm Rendered
#
# Renders a vendor Helm chart into individual manifests, processes and
# validates them, then packages with token substitution.
#
# All configuration is in KaptainPM.yaml - see docs for available fields.

name: Kubernetes Bundle - Vendor Helm Rendered

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/kubernetes-bundle-vendor-helm-rendered.yaml@1.1.48
    permissions:
      contents: write
      packages: write
      checks: write
    # Override the default runner if needed:
    # with:
    #   runner: ubuntu-latest
