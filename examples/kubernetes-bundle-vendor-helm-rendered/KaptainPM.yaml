apiVersion: kaptain.org/1.22
kind: kubernetes-bundle-vendor-helm-rendered
spec:
  main:
    vendorHelmRendered:
      ociChart: oci://example.com/charts/your-chart:1.0.0
      # XOR either the above or the below - not both
      repoUrl: https://example.com/charts
      chartName: your-chart
