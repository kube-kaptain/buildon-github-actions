#
# Docker Build Retag
#
# Pulls an upstream image, retags with your name and version, pushes to your
# registry. Configure the source image in KaptainPM.yaml under docker.retag.
#
# All configuration is in KaptainPM.yaml - see docs for available fields.

name: Docker Build Retag

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/docker-build-retag.yaml@1.1.17
    permissions:
      contents: write
      packages: write
      checks: write
