#
# AWS EKS Cluster Management
#
# Builds an EKS cluster management image layering your cluster config on top of
# the base aws-eks-cluster-management image. Generates cluster.yaml with tokenized
# values, validates token placement pre-build, performs token substitution during
# docker build, then validates substituted values and image integrity post-build.
#
# Config files live in src/config/ (one value per file, PascalCase filename).
# The default token style is PascalCase with shell delimiters: ${AwsRegion}
# Adjust the file names if you change token-name-style.
#
# ── Required ──────────────────────────────────────────────────────────────────
#   AwsRegion                             - AWS region (e.g., eu-west-1)
#   VpcId                                 - VPC identifier (e.g., vpc-0123456789abcdef0)
#   NodegroupInstanceType                 - EC2 instance type (e.g., t3.medium)
#   SecretsEncryptionKeyArn               - KMS key ARN for Kubernetes secrets encryption
#   PrivateSubnetIdA                      - Private subnet ID for AZ a (EKS_PRIVATE_NETWORKING=true)
#   PrivateSubnetIdB                      - Private subnet ID for AZ b (EKS_PRIVATE_NETWORKING=true)
#   PrivateSubnetIdC                      - Private subnet ID for AZ c (EKS_PRIVATE_NETWORKING=true)
#   PublicSubnetIdA                       - Public subnet ID for AZ a (EKS_PUBLIC_NETWORKING=true)
#   PublicSubnetIdB                       - Public subnet ID for AZ b (EKS_PUBLIC_NETWORKING=true)
#   PublicSubnetIdC                       - Public subnet ID for AZ c (EKS_PUBLIC_NETWORKING=true)
#
# ── Conditional (required when related switch is on) ──────────────────────────
#   AutoModeConfigNodePools               - Comma-separated node pool names (AutoModeConfigEnabled=true)
#
# ── Optional (generates section when present, omitted when absent) ────────────
#   VpcSecurityGroup                      - VPC security group ID (e.g., sg-0123456789abcdef0)
#   PrivateClusterEnabled                 - Generates privateCluster block (e.g., true)
#   NodegroupPrivateNetworking            - Adds privateNetworking to nodegroup (e.g., true)
#   NodegroupIamInstanceRoleArn           - Adds iam.instanceRoleARN to nodegroup
#   AutoModeConfigEnabled                 - Generates autoModeConfig block (e.g., true or false)
#   NetworkConfigServiceIpV4Cidr          - Generates kubernetesNetworkConfig block with custom service CIDR
#   MetadataTags                          - Additional cluster metadata tags (key: value per line)
#   NodegroupTags                         - Additional nodegroup tags (key: value per line)
#   NodegroupLabels                       - Additional nodegroup labels (key: value per line)
#   Addons<Name>ServiceAccountRoleArn     - Per-addon IAM role (e.g., AddonsVpcCniServiceAccountRoleArn)
#
# ── Tokens with defaults (override by creating the file) ─────────────────────
#   KubernetesMinorVersion                - K8s minor version (also settable via env var)
#   IamWithOidc                           - default: true
#   VpcClusterEndpointsPrivateAccess      - default: true
#   VpcClusterEndpointsPublicAccess       - default: false
#   CloudWatchClusterLoggingEnableTypes   - default: api,audit,authenticator,controllerManager,scheduler
#   NodegroupAmiFamily                    - default: AmazonLinux2023
#   NodegroupVolumeSize                   - default: 20 (GB)
#   NodegroupUpdateConfigMaxUnavailable   - default: 1 (must be > 0)
#   NodegroupDesiredCapacity              - default: 1
#   NodegroupMinSize                      - default: 3
#   NodegroupMaxSize                      - default: 12
#
# Copy this to .github/workflows/build.yaml in your repo.

name: EKS Cluster Management

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/aws-eks-cluster-management.yaml@1.0.77
    permissions:
      contents: write
      packages: write
      checks: write
    with:
      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ Kubernetes Version (required - no default)                         │
      # └─────────────────────────────────────────────────────────────────────┘
      kubernetes-minor-version: '32'

      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ Networking                                                          │
      # └─────────────────────────────────────────────────────────────────────┘
      # Private networking is enabled by default. Public and Cilium are off.
      # Each switch controls which subnets appear in the generated cluster.yaml
      # and which config files are required in src/config/.
      #
      eks-private-networking: true     # Default: true  (requires PrivateSubnetIdA/B/C)
      # eks-public-networking: false   # Default: false (requires PublicSubnetIdA/B/C)
      # eks-cilium-ebpf-networking: false  # Default: false (generates controlplane-only yaml, removes kube-proxy and vpc-cni from addons)

      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ Nodegroup Sizing                                                    │
      # └─────────────────────────────────────────────────────────────────────┘
      # Defaults written to platform config dirs if not in src/config/.
      # These become tokens in cluster.yaml: ${NodegroupDesiredCapacity}, etc.
      #
      # nodegroup-desired-capacity: '1'   # Default
      # nodegroup-min-size: '3'           # Default
      # nodegroup-max-size: '12'          # Default

      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ EKS Addons                                                          │
      # └─────────────────────────────────────────────────────────────────────┘
      # Comma-separated addon names (versions resolved at deploy time).
      # Cilium mode automatically removes kube-proxy and vpc-cni from this list.
      #
      # eks-addons-list: 'coredns,kube-proxy,vpc-cni,aws-ebs-csi-driver,aws-efs-csi-driver'  # Default

      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ Base Image                                                          │
      # └─────────────────────────────────────────────────────────────────────┘
      # The base image contains eksctl, kubectl, age, yq, and cluster management
      # scripts. Override to use a custom or pinned version.
      #
      # eks-base-image-registry: 'ghcr.io'                          # Default
      # eks-base-image-namespace: 'kube-kaptain'                    # Default
      # eks-base-image-name: 'aws/aws-eks-cluster-management'       # Default
      # eks-base-image-tag: '1.2'                                   # Default

      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ Docker Platform                                                     │
      # └─────────────────────────────────────────────────────────────────────┘
      # Default is linux/amd64 (single platform). Set to
      # 'linux/amd64,linux/arm64' for multi-platform builds.
      #
      # docker-platform: 'linux/amd64'                              # Default

      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ Source Directories                                                  │
      # └─────────────────────────────────────────────────────────────────────┘
      # Place custom cluster.yaml in eks-cluster-yaml-sub-path to override
      # generation (three-tier: context dir > src/eks/ > generate).
      # Place aws-credentials.age in secrets-sub-path for age-encrypted creds.
      #
      # eks-cluster-yaml-sub-path: 'src/eks'       # Default
      # secrets-sub-path: 'src/secrets'             # Default

      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ Token Substitution                                                  │
      # └─────────────────────────────────────────────────────────────────────┘
      # token-delimiter-style: 'shell'       # Default: ${Token}
      # token-name-style: 'PascalCase'       # Default: AwsRegion, VpcId, etc.
      # config-sub-path: 'src/config'        # Default: where token files live

      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ Test Injection                                                      │
      # └─────────────────────────────────────────────────────────────────────┘
      # hook-pre-tagging-tests-script-sub-path: 'bin/run-tests.bash'
      # hook-pre-docker-prepare-script-sub-path: 'bin/pre-docker.bash'
      # hook-post-docker-tests-script-sub-path: 'bin/test-container.bash'

      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ GitHub Release                                                      │
      # └─────────────────────────────────────────────────────────────────────┘
      # Release includes the Docker image and substituted cluster.yaml files
      # as downloadable artifacts.
      #
      # github-release-enabled: true                                # Default
