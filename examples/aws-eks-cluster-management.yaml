# AWS EKS Cluster Management
#
# Builds an EKS cluster management image with kubectl and AWS CLI baked in.
# Used for cluster lifecycle operations (upgrades, node management, etc).
#
# All configuration is in KaptainPM.yaml - see docs for available fields.

name: AWS EKS Cluster Management

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/aws-eks-cluster-management.yaml@1.1.16
    permissions:
      contents: write
      packages: write
      checks: write
