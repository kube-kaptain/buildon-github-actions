name: 'Vendor Helm Inject Build Timestamp'
description: 'Stamps kaptain.org/build-timestamp into every manifest under kaptain-out/manifests/combined/ (vendor flow only - run after package-prepare and before token substitution to keep src/kubernetes/ stable)'

inputs:
  # INJECT-INPUT: output-sub-path

runs:
  using: 'composite'
  steps:
    - name: Inject build timestamp into combined manifests
      id: inject-build-timestamp
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
      run: "${{ github.action_path }}/../../scripts/main/vendor-helm-inject-build-timestamp"
