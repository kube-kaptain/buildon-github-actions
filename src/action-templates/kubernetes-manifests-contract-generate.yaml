name: 'Kubernetes Manifests Contract Generate'
description: 'Generates a manifests contract file describing token scheme, required config, and compatibility'

inputs:
  # INJECT-INPUT: output-sub-path
  # INJECT-INPUT: token-substitution

  # Action-specific inputs
  project-name:
    description: 'Project name'
    required: true
  version:
    description: 'Version'
    required: true
  build-kind:
    description: 'Build kind (maps to contract kind)'
    required: true
  metadata-description:
    description: 'Description from KaptainPM.yaml metadata'
    required: false
    default: ''
  defaults-sub-path:
    description: 'Source directory for default values'
    required: false
    default: 'src/defaults'

outputs:
  contract-zip-sub-path:
    description: 'Directory containing the contract zip (relative)'
    value: ${{ steps.contract.outputs.CONTRACT_ZIP_SUB_PATH }}
  contract-zip-file-name:
    description: 'Filename of the contract zip'
    value: ${{ steps.contract.outputs.CONTRACT_ZIP_FILE_NAME }}

runs:
  using: 'composite'
  steps:
    - name: Generate manifests contract
      id: contract
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        PROJECT_NAME: ${{ inputs.project-name }}
        VERSION: ${{ inputs.version }}
        BUILD_KIND: ${{ inputs.build-kind }}
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
        TOKEN_DELIMITER_STYLE: ${{ inputs.token-delimiter-style }}
        TOKEN_NAME_STYLE: ${{ inputs.token-name-style }}
        METADATA_DESCRIPTION: ${{ inputs.metadata-description }}
        DEFAULTS_SUB_PATH: ${{ inputs.defaults-sub-path }}
      run: "${{ github.action_path }}/../../scripts/main/kubernetes-manifests-contract-generate"
