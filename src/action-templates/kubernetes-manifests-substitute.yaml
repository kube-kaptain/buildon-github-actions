name: 'Kubernetes Manifests Substitute'
description: 'Phase A: copies prepared manifests and runs token substitution'

inputs:
  # Action-specific inputs
  project-name:
    description: 'Project name for substituted directory'
    required: true
  version:
    description: 'Version (carried for log clarity)'
    required: true

  # INJECT-INPUT: output-sub-path
  # INJECT-INPUT: token-substitution

runs:
  using: 'composite'
  steps:
    - name: Substitute manifests
      id: substitute
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        PROJECT_NAME: ${{ inputs.project-name }}
        VERSION: ${{ inputs.version }}
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
        TOKEN_DELIMITER_STYLE: ${{ inputs.token-delimiter-style }}
        CONFIG_VALUE_TRAILING_NEWLINE: ${{ inputs.config-value-trailing-newline }}
        TOKEN_SUBSTITUTION_PASSES: ${{ inputs.token-substitution-passes }}
      run: "${{ github.action_path }}/../../scripts/main/kubernetes-manifests-substitute"
