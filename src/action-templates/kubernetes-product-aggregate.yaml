name: 'Kubernetes Product Aggregate'
description: 'Resolves spec.contents bundles, stages manifests/defaults into the additional-manifests and additional-defaults drop dirs for downstream packaging'

inputs:
  # INJECT-INPUT: output-sub-path
  # INJECT-INPUT: token-substitution
  # INJECT-INPUT: docker-build
  # INJECT-INPUT: image-build-command

  # Action-specific inputs
  project-name:
    description: 'Project name (must satisfy product naming rule)'
    required: true
  is-release:
    description: 'When true, content version ranges resolve to release-only bundle versions (excludes -PRERELEASE and platform-suffixed tags)'
    required: false
    default: 'false'

outputs:
  product-name:
    description: 'PROJECT_NAME verbatim'
    value: ${{ steps.product-aggregate.outputs.PRODUCT_NAME }}
  product-short-name:
    description: 'PROJECT_NAME with product- prefix or -product suffix stripped'
    value: ${{ steps.product-aggregate.outputs.PRODUCT_SHORT_NAME }}
  product-contents-file:
    description: 'Path to markdown bullet list of spec.contents entries for release notes'
    value: ${{ steps.product-aggregate.outputs.PRODUCT_CONTENTS_FILE }}

runs:
  using: 'composite'
  steps:
    - name: Aggregate product
      id: product-aggregate
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        PROJECT_NAME: ${{ inputs.project-name }}
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
        TOKEN_DELIMITER_STYLE: ${{ inputs.token-delimiter-style }}
        TOKEN_NAME_STYLE: ${{ inputs.token-name-style }}
        DOCKER_TARGET_REGISTRY: ${{ inputs.docker-target-registry }}
        DOCKER_TARGET_NAMESPACE: ${{ inputs.docker-target-namespace }}
        IMAGE_BUILD_COMMAND: ${{ inputs.image-build-command }}
        IS_RELEASE: ${{ inputs.is-release }}
      run: "${{ github.action_path }}/../../scripts/main/kubernetes-product-aggregate"
