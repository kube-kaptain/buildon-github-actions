name: 'Vendor Helm Inject Build Details'
description: 'Stamps kaptain.org/build-timestamp and kaptain.org/built-by into every manifest under kaptain-out/manifests/combined/ (vendor flow only - run after package-prepare and before token substitution to keep src/kubernetes/ stable)'

inputs:
  # INJECT-INPUT: output-sub-path

runs:
  using: 'composite'
  steps:
    - name: Inject build details into combined manifests
      id: inject-build-details
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
      run: "${{ github.action_path }}/../../scripts/main/vendor-helm-inject-build-details"
