name: 'Docker Multi-Tag'
description: 'Retags built images and manifest lists for additional push registries'

inputs:
  # INJECT-INPUT: docker-push-image-list
  # INJECT-INPUT: docker-build
  # INJECT-INPUT: image-build-command

outputs:
  images-tagged:
    description: 'Number of image retag operations'
    value: ${{ steps.tag.outputs.IMAGES_TAGGED }}
  manifests-tagged:
    description: 'Number of manifest list retag operations'
    value: ${{ steps.tag.outputs.MANIFESTS_TAGGED }}

runs:
  using: 'composite'
  steps:
    - name: Tag images
      id: tag
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        DOCKER_PUSH_IMAGE_LIST_FILE: ${{ inputs.docker-push-image-list-file }}
        DOCKER_PUSH_TARGETS: ${{ inputs.docker-push-targets }}
        DOCKER_TARGET_REGISTRY: ${{ inputs.docker-target-registry }}
        DOCKER_TARGET_NAMESPACE: ${{ inputs.docker-target-namespace }}
        IMAGE_BUILD_COMMAND: ${{ inputs.image-build-command }}
      run: "${{ github.action_path }}/../../scripts/main/docker-multi-tag"
