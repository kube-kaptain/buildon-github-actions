name: 'Kubernetes Product Lineage Data Generate'
description: 'Emits the product lineage data ConfigMap (presence + lineage record) into the substituted manifests tree'

inputs:
  # INJECT-INPUT: output-sub-path
  # INJECT-INPUT: token-substitution

  # Action-specific inputs
  project-name:
    description: 'Project name'
    required: true
  version:
    description: 'Version'
    required: true
  product-name:
    description: 'Product name (PROJECT_NAME verbatim)'
    required: true
  product-short-name:
    description: 'Product short name (PROJECT_NAME with product- prefix or -product suffix stripped)'
    required: true
  git-sha:
    description: 'Git SHA for the kaptain.org/git-sha annotation (optional)'
    required: false
    default: ''
  kaptainpm-file:
    description: 'Path to the final KaptainPM.yaml'
    required: false
    default: 'kaptainpm/final/KaptainPM.yaml'

outputs: {}

runs:
  using: 'composite'
  steps:
    - name: Generate product lineage data ConfigMap
      id: lineage-data
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        PROJECT_NAME: ${{ inputs.project-name }}
        VERSION: ${{ inputs.version }}
        PRODUCT_NAME: ${{ inputs.product-name }}
        PRODUCT_SHORT_NAME: ${{ inputs.product-short-name }}
        GIT_SHA: ${{ inputs.git-sha }}
        KAPTAINPM_FILE: ${{ inputs.kaptainpm-file }}
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
        TOKEN_DELIMITER_STYLE: ${{ inputs.token-delimiter-style }}
        TOKEN_NAME_STYLE: ${{ inputs.token-name-style }}
        CONFIG_VALUE_TRAILING_NEWLINE: ${{ inputs.config-value-trailing-newline }}
        TOKEN_SUBSTITUTION_PASSES: ${{ inputs.token-substitution-passes }}
      run: "${{ github.action_path }}/../../scripts/main/kubernetes-product-lineage-data-generate"
