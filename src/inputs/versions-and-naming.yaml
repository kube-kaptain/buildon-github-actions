#
# Step outputs from the versions-and-naming action.
# Consumed by hook actions and any action that needs version/naming values.

# Core inputs for almost everything
project-name:
  description: 'Project name'
  required: true
version:
  description: 'Version in plain normal format'
  required: true
docker-image-name:
  description: 'Docker image name - project name prefix in front then a slash then project name'
  required: true

# Subset/superset versions useful for certain situations
version-major:
  description: 'Major version part'
  required: true
version-minor:
  description: 'Minor version part'
  required: true
version-patch:
  description: 'Patch version part'
  required: true
version-2-part:
  description: 'Version padded/truncated to 2 parts'
  required: true
version-3-part:
  description: 'Version padded/truncated to 3 parts'
  required: true
version-4-part:
  description: 'Version padded/truncated to 4 parts'
  required: true

# DNS safe versions for Kubernetes and other naming tasks
version-dns-safe:
  description: 'VERSION with dots replaced by hyphens'
  required: true
version-2-part-dns-safe:
  description: 'VERSION_2_PART with dots replaced by hyphens'
  required: true
version-3-part-dns-safe:
  description: 'VERSION_3_PART with dots replaced by hyphens'
  required: true
version-4-part-dns-safe:
  description: 'VERSION_4_PART with dots replaced by hyphens'
  required: true

# PR/local vs release build inputs
is-release:
  description: 'Whether this is a release build'
  required: true
docker-tag:
  description: 'Docker tag - separate for PR and local builds to not collide'
  required: true
git-tag:
  description: 'Git tag - separate for PR and local builds to not collide'
  required: true
