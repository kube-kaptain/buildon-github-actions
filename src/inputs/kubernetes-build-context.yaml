#
# Build-context inputs for kubernetes manifest generators. These flow through
# to the kaptain.org/* annotations on generated resources. Empty values are
# safe; the generator omits the corresponding annotation when unset.
image-uri:
  description: 'Full container image URI for the kaptain.org/image-uri annotation (empty when no image is built)'
  required: false
  type: string
  default: ''
