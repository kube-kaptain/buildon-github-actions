name: 'Docker Multi-Tag'
description: 'Retags built images and manifest lists for additional push registries'

inputs:
  # Docker push image list file path
  docker-push-image-list-file:
    description: 'Path to file listing image URIs for docker-push-all (set by docker-registry-logins)'
    required: true
  # Docker registry logins
  docker-registry-logins:
    description: 'YAML config for Docker registry logins (registry URL as key)'
    required: false
    default: ''
  # Docker target config
  docker-target-registry:
    description: 'Target container registry domain (defaults to ghcr.io on GH Actions)'
    required: false
    default: ''
  docker-target-namespace:
    description: 'Path segment between registry and image name (defaults to lower cased org name or user ID on GH Actions)'
    required: false
    default: ''
  # Docker push targets
  docker-push-targets:
    description: 'JSON array of additional push targets [{registry, namespace?}]'
    required: false
    default: ''
  # Container runtime
  image-build-command:
    description: 'Container runtime command (podman or docker)'
    required: true

outputs:
  images-tagged:
    description: 'Number of image retag operations'
    value: ${{ steps.tag.outputs.IMAGES_TAGGED }}
  manifests-tagged:
    description: 'Number of manifest list retag operations'
    value: ${{ steps.tag.outputs.MANIFESTS_TAGGED }}

runs:
  using: 'composite'
  steps:
    - name: Tag images
      id: tag
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        DOCKER_PUSH_IMAGE_LIST_FILE: ${{ inputs.docker-push-image-list-file }}
        DOCKER_PUSH_TARGETS: ${{ inputs.docker-push-targets }}
        DOCKER_TARGET_REGISTRY: ${{ inputs.docker-target-registry }}
        DOCKER_TARGET_NAMESPACE: ${{ inputs.docker-target-namespace }}
        IMAGE_BUILD_COMMAND: ${{ inputs.image-build-command }}
      run: "${{ github.action_path }}/../../scripts/main/docker-multi-tag"
