name: 'Docker Build Dockerfile'
description: 'Builds a Docker image from a Dockerfile with token substitution (build only, push handled by docker-push-all)'

inputs:
  # Build output
  output-sub-path:
    description: 'Build output directory (relative)'
    required: false
    default: 'kaptain-out'
  # Docker push image list file path
  docker-push-image-list-file:
    description: 'Path to file listing image URIs for docker-push-all (set by docker-registry-logins)'
    required: true
  # Docker build options
  dockerfile-substitution-files:
    description: 'Comma-separated list of files to perform token substitution on (relative to dockerfile-sub-path and docker-context-sub-path)'
    required: false
    default: 'Dockerfile'
  dockerfile-sub-path:
    description: 'Directory containing Dockerfile, relative to repo root.'
    required: false
    default: 'src/docker'
  dockerfile-squash:
    description: 'Squash mode: squash, squash-all, or no'
    required: false
    default: 'squash'
  dockerfile-no-cache:
    description: 'Disable layer caching for reproducible builds'
    required: false
    default: 'true'
  dockerfile-sub-path-linux-amd64:
    description: 'Per-platform Dockerfile directory for linux/amd64 multi-platform builds'
    required: false
    default: 'src/docker-linux-amd64'
  dockerfile-sub-path-linux-arm64:
    description: 'Per-platform Dockerfile directory for linux/arm64 multi-platform builds'
    required: false
    default: 'src/docker-linux-arm64'
  # Token substitution
  token-delimiter-style:
    description: 'Token delimiter syntax for variables (shell, mustache, helm, erb, github-actions, blade, stringtemplate, ognl, t4, swift)'
    required: false
    default: 'shell'
  token-name-style:
    description: 'Case style for token names (UPPER_SNAKE, lower_snake, lower-kebab, UPPER-KEBAB, camelCase, PascalCase, lower.dot, UPPER.DOT)'
    required: false
    default: 'PascalCase'
  token-name-validation:
    description: 'How to validate user token names (MATCH = must match token-name-style, ALL = accept any valid name)'
    required: false
    default: 'MATCH'
  allow-builtin-token-override:
    description: 'Allow user tokens to override built-in tokens (for template/reusable projects)'
    required: false
    default: 'false'
  config-sub-path:
    description: 'Directory containing user-defined token files (relative)'
    required: false
    default: 'src/config'
  config-value-trailing-newline:
    description: 'How to handle trailing newlines in config values (strip-for-single-line, preserve-all, always-strip-one-newline)'
    required: false
    default: 'strip-for-single-line'
  token-substitution-passes:
    description: 'Number of times to run the token substitution pass (for nested token references)'
    required: false
    default: '1'

  # Step outputs from the versions-and-naming action.
  # Consumed by hook actions and any action that needs version/naming values.

  # Core inputs for almost everything
  project-name:
    description: 'Project name'
    required: true
  version:
    description: 'Version in plain normal format'
    required: true
  docker-image-name:
    description: 'Docker image name - project name prefix in front then a slash then project name'
    required: true

  # Subset/superset versions useful for certain situations
  version-major:
    description: 'Major version part'
    required: true
  version-minor:
    description: 'Minor version part'
    required: true
  version-patch:
    description: 'Patch version part'
    required: true
  version-2-part:
    description: 'Version padded/truncated to 2 parts'
    required: true
  version-3-part:
    description: 'Version padded/truncated to 3 parts'
    required: true
  version-4-part:
    description: 'Version padded/truncated to 4 parts'
    required: true

  # DNS safe versions for Kubernetes and other naming tasks
  version-dns-safe:
    description: 'VERSION with dots replaced by hyphens'
    required: true
  version-2-part-dns-safe:
    description: 'VERSION_2_PART with dots replaced by hyphens'
    required: true
  version-3-part-dns-safe:
    description: 'VERSION_3_PART with dots replaced by hyphens'
    required: true
  version-4-part-dns-safe:
    description: 'VERSION_4_PART with dots replaced by hyphens'
    required: true

  # PR/local vs release build inputs
  is-release:
    description: 'Whether this is a release build'
    required: true
  docker-tag:
    description: 'Docker tag - separate for PR and local builds to not collide'
    required: true
  git-tag:
    description: 'Git tag - separate for PR and local builds to not collide'
    required: true

  # Action-specific inputs (passed from workflow/version generator)
  docker-target-registry:
    description: 'Target container registry (pre-resolved by workflow)'
    required: true
  docker-target-namespace:
    description: 'Namespace between registry and image name (pre-resolved by workflow)'
    required: true
  repository-owner:
    description: 'Repository owner (from version generator)'
    required: true
  repository-name:
    description: 'Repository name (from version generator)'
    required: true
  # Container runtime
  image-build-command:
    description: 'Container runtime command (podman or docker)'
    required: true
  # Target platform for docker/podman operations
  docker-platform:
    description: 'Target platform (linux/amd64, linux/arm64, or both comma-separated)'
    required: false
    default: 'linux/amd64'

outputs:
  docker-target-image-full-uri:
    description: 'Full target image reference'
    value: ${{ steps.build.outputs.DOCKER_TARGET_IMAGE_FULL_URI }}
  docker-target-registry:
    description: 'Target registry (pass-through for downstream)'
    value: ${{ inputs.docker-target-registry }}
  docker-target-namespace:
    description: 'Target namespace (pass-through for downstream)'
    value: ${{ inputs.docker-target-namespace }}

runs:
  using: 'composite'
  steps:
    - name: Build image
      id: build
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        DOCKER_TARGET_REGISTRY: ${{ inputs.docker-target-registry }}
        DOCKER_TARGET_NAMESPACE: ${{ inputs.docker-target-namespace }}
        DOCKER_IMAGE_NAME: ${{ inputs.docker-image-name }}
        DOCKER_TAG: ${{ inputs.docker-tag }}
        VERSION: ${{ inputs.version }}
        VERSION_MAJOR: ${{ inputs.version-major }}
        VERSION_MINOR: ${{ inputs.version-minor }}
        VERSION_PATCH: ${{ inputs.version-patch }}
        VERSION_2_PART: ${{ inputs.version-2-part }}
        VERSION_3_PART: ${{ inputs.version-3-part }}
        VERSION_4_PART: ${{ inputs.version-4-part }}
        VERSION_DNS_SAFE: ${{ inputs.version-dns-safe }}
        VERSION_2_PART_DNS_SAFE: ${{ inputs.version-2-part-dns-safe }}
        VERSION_3_PART_DNS_SAFE: ${{ inputs.version-3-part-dns-safe }}
        VERSION_4_PART_DNS_SAFE: ${{ inputs.version-4-part-dns-safe }}
        GIT_TAG: ${{ inputs.git-tag }}
        PROJECT_NAME: ${{ inputs.project-name }}
        IS_RELEASE: ${{ inputs.is-release }}
        REPOSITORY_OWNER: ${{ inputs.repository-owner }}
        REPOSITORY_NAME: ${{ inputs.repository-name }}
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
        DOCKER_PUSH_IMAGE_LIST_FILE: ${{ inputs.docker-push-image-list-file }}
        IMAGE_BUILD_COMMAND: ${{ inputs.image-build-command }}
        # Docker build options
        DOCKERFILE_SQUASH: ${{ inputs.dockerfile-squash }}
        DOCKERFILE_NO_CACHE: ${{ inputs.dockerfile-no-cache }}
        DOCKERFILE_SUBSTITUTION_FILES: ${{ inputs.dockerfile-substitution-files }}
        DOCKER_PLATFORM: ${{ inputs.docker-platform }}
        # Dockerfile source dirs
        DOCKERFILE_SUB_PATH: ${{ inputs.dockerfile-sub-path }}
        DOCKERFILE_SUB_PATH_LINUX_AMD64: ${{ inputs.dockerfile-sub-path-linux-amd64 }}
        DOCKERFILE_SUB_PATH_LINUX_ARM64: ${{ inputs.dockerfile-sub-path-linux-arm64 }}
        # Token substitution
        TOKEN_DELIMITER_STYLE: ${{ inputs.token-delimiter-style }}
        TOKEN_NAME_STYLE: ${{ inputs.token-name-style }}
        TOKEN_NAME_VALIDATION: ${{ inputs.token-name-validation }}
        CONFIG_SUB_PATH: ${{ inputs.config-sub-path }}
        ALLOW_BUILTIN_TOKEN_OVERRIDE: ${{ inputs.allow-builtin-token-override }}
        CONFIG_VALUE_TRAILING_NEWLINE: ${{ inputs.config-value-trailing-newline }}
        TOKEN_SUBSTITUTION_PASSES: ${{ inputs.token-substitution-passes }}
      run: "${{ github.action_path }}/../../scripts/main/docker-build-dockerfile"
