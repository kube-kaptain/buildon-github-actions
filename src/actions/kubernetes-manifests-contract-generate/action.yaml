name: 'Kubernetes Manifests Contract Generate'
description: 'Generates a manifests contract file describing token scheme, required config, and compatibility'

inputs:
  # Build output
  output-sub-path:
    description: 'Build output directory (relative)'
    required: false
    default: 'kaptain-out'
  # Token substitution
  token-delimiter-style:
    description: 'Token delimiter syntax for variables (shell, mustache, helm, erb, github-actions, blade, stringtemplate, ognl, t4, swift)'
    required: false
    default: 'shell'
  token-name-style:
    description: 'Case style for token names (UPPER_SNAKE, lower_snake, lower-kebab, UPPER-KEBAB, camelCase, PascalCase, lower.dot, UPPER.DOT)'
    required: false
    default: 'PascalCase'
  token-name-validation:
    description: 'How to validate user token names (MATCH = must match token-name-style, ALL = accept any valid name)'
    required: false
    default: 'MATCH'
  allow-builtin-token-override:
    description: 'Allow user tokens to override built-in tokens (for template/reusable projects)'
    required: false
    default: 'false'
  config-sub-path:
    description: 'Directory containing user-defined token files (relative)'
    required: false
    default: 'src/config'
  config-value-trailing-newline:
    description: 'How to handle trailing newlines in config values (strip-for-single-line, preserve-all, always-strip-one-newline)'
    required: false
    default: 'strip-for-single-line'
  token-substitution-passes:
    description: 'Number of times to run the token substitution pass (for nested token references)'
    required: false
    default: '1'

  # Action-specific inputs
  project-name:
    description: 'Project name'
    required: true
  version:
    description: 'Version'
    required: true
  build-kind:
    description: 'Build kind (maps to contract kind)'
    required: true
  metadata-description:
    description: 'Description from KaptainPM.yaml metadata'
    required: false
    default: ''
  defaults-sub-path:
    description: 'Source directory for default values'
    required: false
    default: 'src/defaults'

outputs:
  contract-zip-sub-path:
    description: 'Directory containing the contract zip (relative)'
    value: ${{ steps.contract.outputs.CONTRACT_ZIP_SUB_PATH }}
  contract-zip-file-name:
    description: 'Filename of the contract zip'
    value: ${{ steps.contract.outputs.CONTRACT_ZIP_FILE_NAME }}

runs:
  using: 'composite'
  steps:
    - name: Generate manifests contract
      id: contract
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        PROJECT_NAME: ${{ inputs.project-name }}
        VERSION: ${{ inputs.version }}
        BUILD_KIND: ${{ inputs.build-kind }}
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
        TOKEN_DELIMITER_STYLE: ${{ inputs.token-delimiter-style }}
        TOKEN_NAME_STYLE: ${{ inputs.token-name-style }}
        METADATA_DESCRIPTION: ${{ inputs.metadata-description }}
        DEFAULTS_SUB_PATH: ${{ inputs.defaults-sub-path }}
      run: "${{ github.action_path }}/../../scripts/main/kubernetes-manifests-contract-generate"
