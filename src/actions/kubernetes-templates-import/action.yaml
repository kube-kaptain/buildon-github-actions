name: 'Kubernetes Templates Import'
description: 'Resolves spec.templates bundles and imports them into the additional-manifests and additional-defaults drop dirs (flat or hierarchy layout)'

inputs:
  # Build output
  output-sub-path:
    description: 'Build output directory (relative)'
    required: false
    default: 'kaptain-out'
  # Token substitution
  token-delimiter-style:
    description: 'Token delimiter syntax for variables (shell, mustache, helm, erb, github-actions, blade, stringtemplate, ognl, t4, swift)'
    required: false
    default: 'shell'
  token-name-style:
    description: 'Case style for token names (UPPER_SNAKE, lower_snake, lower-kebab, UPPER-KEBAB, camelCase, PascalCase, lower.dot, UPPER.DOT)'
    required: false
    default: 'PascalCase'
  token-name-validation:
    description: 'How to validate user token names (MATCH = must match token-name-style, ALL = accept any valid name)'
    required: false
    default: 'MATCH'
  allow-builtin-token-override:
    description: 'Allow user tokens to override built-in tokens (for template/reusable projects)'
    required: false
    default: 'false'
  config-sub-path:
    description: 'Directory containing user-defined token files (relative)'
    required: false
    default: 'src/config'
  config-value-trailing-newline:
    description: 'How to handle trailing newlines in config values (strip-for-single-line, preserve-all, always-strip-one-newline)'
    required: false
    default: 'strip-for-single-line'
  token-substitution-passes:
    description: 'Number of times to run the token substitution pass (for nested token references)'
    required: false
    default: '1'
  # Docker registry logins
  docker-registry-logins:
    description: 'YAML config for Docker registry logins (registry URL as key)'
    required: false
    default: ''
  # Docker target config
  docker-target-registry:
    description: 'Target container registry domain (defaults to ghcr.io on GH Actions)'
    required: false
    default: ''
  docker-target-namespace:
    description: 'Path segment between registry and image name (defaults to lower cased org name or user ID on GH Actions)'
    required: false
    default: ''
  # Docker push targets
  docker-push-targets:
    description: 'JSON array of additional push targets [{registry, namespace?}]'
    required: false
    default: ''
  # Container runtime
  image-build-command:
    description: 'Container runtime command (podman or docker)'
    required: true

  # Action-specific inputs
  project-name:
    description: 'Project name (for log clarity)'
    required: true
  templates-layout:
    description: 'Layout for imported template manifests: flat (default) or hierarchy'
    required: false
    default: 'flat'
  is-release:
    description: 'When true, template version ranges resolve to release-only bundle versions (excludes -PRERELEASE and platform-suffixed tags)'
    required: false
    default: 'false'

outputs:
  templates-list-file:
    description: 'Path to markdown bullet list of spec.templates entries'
    value: ${{ steps.templates-import.outputs.TEMPLATES_LIST_FILE }}

runs:
  using: 'composite'
  steps:
    - name: Import templates
      id: templates-import
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        PROJECT_NAME: ${{ inputs.project-name }}
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
        TOKEN_DELIMITER_STYLE: ${{ inputs.token-delimiter-style }}
        TOKEN_NAME_STYLE: ${{ inputs.token-name-style }}
        TEMPLATES_LAYOUT: ${{ inputs.templates-layout }}
        DOCKER_TARGET_REGISTRY: ${{ inputs.docker-target-registry }}
        DOCKER_TARGET_NAMESPACE: ${{ inputs.docker-target-namespace }}
        IMAGE_BUILD_COMMAND: ${{ inputs.image-build-command }}
        IS_RELEASE: ${{ inputs.is-release }}
      run: "${{ github.action_path }}/../../scripts/main/kubernetes-templates-import"
