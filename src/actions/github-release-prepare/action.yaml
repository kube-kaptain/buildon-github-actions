name: GitHub Release Prepare
description: Prepares files for GitHub release with optional substitution and version suffix

inputs:
  # GitHub release
  github-release-enabled:
    description: 'Create a GitHub release on version tags'
    required: false
    default: 'true'
  github-release-substituted-files:
    description: 'Files with token substitution and version suffix (comma/space-separated)'
    required: false
    default: ''
  github-release-verbatim-files:
    description: 'Files copied as-is with version suffix only (comma/space-separated)'
    required: false
    default: ''
  github-release-raw-files:
    description: 'Files already versioned, copied as-is with no renaming (comma/space-separated, filenames must end with -VERSION.ext)'
    required: false
    default: ''
  github-release-notes:
    description: 'Inline release notes string (mutually exclusive with github-release-notes-file)'
    required: false
    default: ''
  github-release-notes-file:
    description: 'Path to release notes file (mutually exclusive with github-release-notes)'
    required: false
    default: ''
  github-release-add-version-to-filenames:
    description: 'Add version suffix to release filenames (e.g., file.yaml -> file-1.2.3.yaml)'
    required: false
    default: 'true'

  # Internal file lists (set by workflow prepare fragments, not by users)
  internal-substituted-files:
    description: 'Workflow-generated files needing substitution + version suffix (comma-separated)'
    required: false
    default: ''
  internal-verbatim-files:
    description: 'Workflow-generated files needing version suffix only (comma-separated)'
    required: false
    default: ''
  internal-raw-files:
    description: 'Workflow-generated files already versioned, copied as-is (comma-separated, filenames must end with -VERSION.ext)'
    required: false
    default: ''

  # Build output
  output-sub-path:
    description: 'Build output directory (relative)'
    required: false
    default: 'kaptain-out'
  # Step outputs from the versions-and-naming action.
  # Consumed by hook actions and any action that needs version/naming values.

  # Core inputs for almost everything
  project-name:
    description: 'Project name'
    required: true
  version:
    description: 'Version in plain normal format'
    required: true
  docker-image-name:
    description: 'Docker image name - project name prefix in front then a slash then project name'
    required: true

  # Subset/superset versions useful for certain situations
  version-major:
    description: 'Major version part'
    required: true
  version-minor:
    description: 'Minor version part'
    required: true
  version-patch:
    description: 'Patch version part'
    required: true
  version-2-part:
    description: 'Version padded/truncated to 2 parts'
    required: true
  version-3-part:
    description: 'Version padded/truncated to 3 parts'
    required: true
  version-4-part:
    description: 'Version padded/truncated to 4 parts'
    required: true

  # DNS safe versions for Kubernetes and other naming tasks
  version-dns-safe:
    description: 'VERSION with dots replaced by hyphens'
    required: true
  version-2-part-dns-safe:
    description: 'VERSION_2_PART with dots replaced by hyphens'
    required: true
  version-3-part-dns-safe:
    description: 'VERSION_3_PART with dots replaced by hyphens'
    required: true
  version-4-part-dns-safe:
    description: 'VERSION_4_PART with dots replaced by hyphens'
    required: true

  # PR/local vs release build inputs
  is-release:
    description: 'Whether this is a release build'
    required: true
  docker-tag:
    description: 'Docker tag - separate for PR and local builds to not collide'
    required: true
  git-tag:
    description: 'Git tag - separate for PR and local builds to not collide'
    required: true
  # Token substitution
  token-delimiter-style:
    description: 'Token delimiter syntax for variables (shell, mustache, helm, erb, github-actions, blade, stringtemplate, ognl, t4, swift)'
    required: false
    default: 'shell'
  token-name-style:
    description: 'Case style for token names (UPPER_SNAKE, lower_snake, lower-kebab, UPPER-KEBAB, camelCase, PascalCase, lower.dot, UPPER.DOT)'
    required: false
    default: 'PascalCase'
  token-name-validation:
    description: 'How to validate user token names (MATCH = must match token-name-style, ALL = accept any valid name)'
    required: false
    default: 'MATCH'
  allow-builtin-token-override:
    description: 'Allow user tokens to override built-in tokens (for template/reusable projects)'
    required: false
    default: 'false'
  config-sub-path:
    description: 'Directory containing user-defined token files (relative)'
    required: false
    default: 'src/config'
  config-value-trailing-newline:
    description: 'How to handle trailing newlines in config values (strip-for-single-line, preserve-all, always-strip-one-newline)'
    required: false
    default: 'strip-for-single-line'
  token-substitution-passes:
    description: 'Number of times to run the token substitution pass (for nested token references)'
    required: false
    default: '1'

  # Optional built-in token values (action-specific)
  docker-image-full-uri:
    description: 'Full Docker image URI (optional built-in token)'
    required: false
    default: ''
  docker-target-registry:
    description: 'Target registry (optional built-in token)'
    required: false
    default: ''
  docker-target-namespace:
    description: 'Target namespace (optional built-in token)'
    required: false
    default: ''
  manifests-zip-file-name:
    description: 'Manifests zip filename (optional built-in token)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Prepare release files
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        GITHUB_RELEASE_SUBSTITUTED_FILES: ${{ inputs.github-release-substituted-files }}
        GITHUB_RELEASE_VERBATIM_FILES: ${{ inputs.github-release-verbatim-files }}
        GITHUB_RELEASE_RAW_FILES: ${{ inputs.github-release-raw-files }}
        INTERNAL_SUBSTITUTED_FILES: ${{ inputs.internal-substituted-files }}
        INTERNAL_VERBATIM_FILES: ${{ inputs.internal-verbatim-files }}
        INTERNAL_RAW_FILES: ${{ inputs.internal-raw-files }}
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
        VERSION: ${{ inputs.version }}
        VERSION_MAJOR: ${{ inputs.version-major }}
        VERSION_MINOR: ${{ inputs.version-minor }}
        VERSION_PATCH: ${{ inputs.version-patch }}
        VERSION_2_PART: ${{ inputs.version-2-part }}
        VERSION_3_PART: ${{ inputs.version-3-part }}
        VERSION_4_PART: ${{ inputs.version-4-part }}
        VERSION_DNS_SAFE: ${{ inputs.version-dns-safe }}
        VERSION_2_PART_DNS_SAFE: ${{ inputs.version-2-part-dns-safe }}
        VERSION_3_PART_DNS_SAFE: ${{ inputs.version-3-part-dns-safe }}
        VERSION_4_PART_DNS_SAFE: ${{ inputs.version-4-part-dns-safe }}
        GIT_TAG: ${{ inputs.git-tag }}
        PROJECT_NAME: ${{ inputs.project-name }}
        DOCKER_TAG: ${{ inputs.docker-tag }}
        DOCKER_IMAGE_NAME: ${{ inputs.docker-image-name }}
        IS_RELEASE: ${{ inputs.is-release }}
        ADD_VERSION_TO_FILENAMES: ${{ inputs.github-release-add-version-to-filenames }}
        TOKEN_DELIMITER_STYLE: ${{ inputs.token-delimiter-style }}
        TOKEN_NAME_STYLE: ${{ inputs.token-name-style }}
        TOKEN_NAME_VALIDATION: ${{ inputs.token-name-validation }}
        CONFIG_SUB_PATH: ${{ inputs.config-sub-path }}
        ALLOW_BUILTIN_TOKEN_OVERRIDE: ${{ inputs.allow-builtin-token-override }}
        CONFIG_VALUE_TRAILING_NEWLINE: ${{ inputs.config-value-trailing-newline }}
        TOKEN_SUBSTITUTION_PASSES: ${{ inputs.token-substitution-passes }}
        DOCKER_IMAGE_FULL_URI: ${{ inputs.docker-image-full-uri }}
        TARGET_REGISTRY: ${{ inputs.docker-target-registry }}
        TARGET_NAMESPACE: ${{ inputs.docker-target-namespace }}
        MANIFESTS_ZIP_FILE_NAME: ${{ inputs.manifests-zip-file-name }}
        UTIL_DIR: ${{ github.action_path }}/../../scripts/util
      run: |
        set -euo pipefail

        # Apply defaults for inputs used directly in this script
        ADD_VERSION_TO_FILENAMES="${ADD_VERSION_TO_FILENAMES:-true}"

        # Pass-through vars (called scripts default their own; these just satisfy set -u)
        TOKEN_DELIMITER_STYLE="${TOKEN_DELIMITER_STYLE:-}"
        TOKEN_NAME_STYLE="${TOKEN_NAME_STYLE:-}"
        TOKEN_NAME_VALIDATION="${TOKEN_NAME_VALIDATION:-}"
        ALLOW_BUILTIN_TOKEN_OVERRIDE="${ALLOW_BUILTIN_TOKEN_OVERRIDE:-}"
        CONFIG_SUB_PATH="${CONFIG_SUB_PATH:-}"
        CONFIG_VALUE_TRAILING_NEWLINE="${CONFIG_VALUE_TRAILING_NEWLINE:-}"
        TOKEN_SUBSTITUTION_PASSES="${TOKEN_SUBSTITUTION_PASSES:-}"

        # Fixed output subdirectory (shared knowledge with github-release action)
        RELEASE_OUTPUT_DIR="${OUTPUT_SUB_PATH}/github-release"

        # Add version suffix to filename before extension
        # e.g., template.yaml -> template-1.2.3.yaml
        add_version_suffix() {
          local filename="$1"
          local version="$2"
          local base ext

          if [[ "${filename}" == *.* ]]; then
            base="${filename%.*}"
            ext="${filename##*.}"
            echo "${base}-${version}.${ext}"
          else
            echo "${filename}-${version}"
          fi
        }

        # Validate a raw file has the correct version in its filename
        validate_raw_filename() {
          local filepath="$1"
          local filename
          filename=$(basename "${filepath}")
          local base ext
          if [[ "${filename}" == *.* ]]; then
            base="${filename%.*}"
            ext="${filename##*.}"
            # Accept -VERSION.ext, -VERSION-manifests.zip, or -VERSION-contract.zip
            if [[ "${base}" != *"-${VERSION}" ]] && ! [[ "${ext}" == "zip" && ("${base}" == *"-${VERSION}-manifests" || "${base}" == *"-${VERSION}-contract") ]]; then
              echo "::error::Raw file '${filename}' must end with '-${VERSION}.${ext}', '-${VERSION}-manifests.zip', or '-${VERSION}-contract.zip' — use verbatim-files instead for automatic versioning"
              exit 1
            fi
          else
            if [[ "${filename}" != *"-${VERSION}" ]]; then
              echo "::error::Raw file '${filename}' must end with '-${VERSION}' — use verbatim-files instead for automatic versioning"
              exit 1
            fi
          fi
        }

        # Combine user + internal file lists
        ALL_SUBSTITUTED="${GITHUB_RELEASE_SUBSTITUTED_FILES}"
        if [[ -n "${INTERNAL_SUBSTITUTED_FILES}" ]]; then
          if [[ -n "${ALL_SUBSTITUTED}" ]]; then
            ALL_SUBSTITUTED="${ALL_SUBSTITUTED},${INTERNAL_SUBSTITUTED_FILES}"
          else
            ALL_SUBSTITUTED="${INTERNAL_SUBSTITUTED_FILES}"
          fi
        fi

        ALL_VERBATIM="${GITHUB_RELEASE_VERBATIM_FILES}"
        if [[ -n "${INTERNAL_VERBATIM_FILES}" ]]; then
          if [[ -n "${ALL_VERBATIM}" ]]; then
            ALL_VERBATIM="${ALL_VERBATIM},${INTERNAL_VERBATIM_FILES}"
          else
            ALL_VERBATIM="${INTERNAL_VERBATIM_FILES}"
          fi
        fi

        ALL_RAW="${GITHUB_RELEASE_RAW_FILES}"
        if [[ -n "${INTERNAL_RAW_FILES}" ]]; then
          if [[ -n "${ALL_RAW}" ]]; then
            ALL_RAW="${ALL_RAW},${INTERNAL_RAW_FILES}"
          else
            ALL_RAW="${INTERNAL_RAW_FILES}"
          fi
        fi

        echo "Preparing GitHub release files..."
        echo "  Output: ${RELEASE_OUTPUT_DIR}"
        echo "  Add version to filenames: ${ADD_VERSION_TO_FILENAMES}"

        # Create output directory
        mkdir -p "${RELEASE_OUTPUT_DIR}"

        # If no files specified in any list, we're done
        if [[ -z "${ALL_SUBSTITUTED}" ]] && [[ -z "${ALL_VERBATIM}" ]] && [[ -z "${ALL_RAW}" ]]; then
          echo "No files specified for release"
          exit 0
        fi

        # Prepare tokens if we have substituted files
        tokens_dir=""
        if [[ -n "${ALL_SUBSTITUTED}" ]]; then
          tokens_dir="${OUTPUT_SUB_PATH}/github-release-tokens"
          echo "Preparing substitution tokens..."

          TOKENS_OUTPUT_SUB_PATH="${tokens_dir}" \
          CONFIG_SUB_PATH="${CONFIG_SUB_PATH}" \
          TOKEN_NAME_STYLE="${TOKEN_NAME_STYLE}" \
          TOKEN_NAME_VALIDATION="${TOKEN_NAME_VALIDATION}" \
          ALLOW_BUILTIN_TOKEN_OVERRIDE="${ALLOW_BUILTIN_TOKEN_OVERRIDE}" \
          CONFIG_VALUE_TRAILING_NEWLINE="${CONFIG_VALUE_TRAILING_NEWLINE}" \
          TOKEN_SUBSTITUTION_PASSES="${TOKEN_SUBSTITUTION_PASSES}" \
          PROJECT_NAME="${PROJECT_NAME}" \
          VERSION="${VERSION}" \
          VERSION_MAJOR="${VERSION_MAJOR}" \
          VERSION_MINOR="${VERSION_MINOR}" \
          VERSION_PATCH="${VERSION_PATCH}" \
          VERSION_2_PART="${VERSION_2_PART}" \
          VERSION_3_PART="${VERSION_3_PART}" \
          VERSION_4_PART="${VERSION_4_PART}" \
          VERSION_DNS_SAFE="${VERSION_DNS_SAFE}" \
          VERSION_2_PART_DNS_SAFE="${VERSION_2_PART_DNS_SAFE}" \
          VERSION_3_PART_DNS_SAFE="${VERSION_3_PART_DNS_SAFE}" \
          VERSION_4_PART_DNS_SAFE="${VERSION_4_PART_DNS_SAFE}" \
          GIT_TAG="${GIT_TAG}" \
          IS_RELEASE="${IS_RELEASE}" \
          DOCKER_TAG="${DOCKER_TAG}" \
          DOCKER_IMAGE_NAME="${DOCKER_IMAGE_NAME}" \
          DOCKER_IMAGE_FULL_URI="${DOCKER_IMAGE_FULL_URI:-}" \
          TARGET_REGISTRY="${TARGET_REGISTRY:-}" \
          TARGET_NAMESPACE="${TARGET_NAMESPACE:-}" \
          MANIFESTS_ZIP_FILE_NAME="${MANIFESTS_ZIP_FILE_NAME:-}" \
            "${UTIL_DIR}/prepare-substitution-tokens"
        fi

        # Normalise comma-separated file lists to space-separated
        ALL_SUBSTITUTED="${ALL_SUBSTITUTED//,/ }"
        ALL_VERBATIM="${ALL_VERBATIM//,/ }"
        ALL_RAW="${ALL_RAW//,/ }"

        # Process substituted files (token replacement + version suffix)
        if [[ -n "${ALL_SUBSTITUTED}" ]]; then
          echo "Processing substituted files..."
          # shellcheck disable=SC2086 # Intentional word splitting
          for source_file in ${ALL_SUBSTITUTED}; do
            if [[ ! -f "${source_file}" ]]; then
              echo "::error::Source file not found: ${source_file}"
              exit 1
            fi

            filename=$(basename "${source_file}")
            if [[ "${ADD_VERSION_TO_FILENAMES}" == "true" ]]; then
              target_filename=$(add_version_suffix "${filename}" "${VERSION}")
            else
              target_filename="${filename}"
            fi
            target_path="${RELEASE_OUTPUT_DIR}/${target_filename}"
            echo "  ${source_file} -> ${target_filename} (substituted)"

            cp "${source_file}" "${target_path}"

            CONFIG_VALUE_TRAILING_NEWLINE="${CONFIG_VALUE_TRAILING_NEWLINE}" \
            TOKEN_SUBSTITUTION_PASSES="${TOKEN_SUBSTITUTION_PASSES}" \
              "${UTIL_DIR}/substitute-tokens-from-dir" \
              "${TOKEN_DELIMITER_STYLE}" \
              "${tokens_dir}" \
              "${target_path}"
          done
        fi

        # Process verbatim files (version suffix only, no substitution)
        if [[ -n "${ALL_VERBATIM}" ]]; then
          echo "Processing verbatim files..."
          # shellcheck disable=SC2086 # Intentional word splitting
          for source_file in ${ALL_VERBATIM}; do
            if [[ ! -f "${source_file}" ]]; then
              echo "::error::Source file not found: ${source_file}"
              exit 1
            fi

            filename=$(basename "${source_file}")
            if [[ "${ADD_VERSION_TO_FILENAMES}" == "true" ]]; then
              target_filename=$(add_version_suffix "${filename}" "${VERSION}")
            else
              target_filename="${filename}"
            fi
            target_path="${RELEASE_OUTPUT_DIR}/${target_filename}"
            echo "  ${source_file} -> ${target_filename} (verbatim)"

            cp "${source_file}" "${target_path}"
          done
        fi

        # Process raw files (copied as-is, no renaming — validate version in filename)
        if [[ -n "${ALL_RAW}" ]]; then
          echo "Processing raw files..."
          # shellcheck disable=SC2086 # Intentional word splitting
          for source_file in ${ALL_RAW}; do
            if [[ ! -f "${source_file}" ]]; then
              echo "::error::Source file not found: ${source_file}"
              exit 1
            fi

            validate_raw_filename "${source_file}"

            filename=$(basename "${source_file}")
            target_path="${RELEASE_OUTPUT_DIR}/${filename}"
            echo "  ${source_file} -> ${filename} (raw)"

            cp "${source_file}" "${target_path}"
          done
        fi

        # Clean up tokens dir
        if [[ -n "${tokens_dir}" ]] && [[ -d "${tokens_dir}" ]]; then
          rm -rf "${tokens_dir}"
        fi

        echo "GitHub release preparation complete"
        echo "  Output directory: ${RELEASE_OUTPUT_DIR}"
