name: Docker Registry Logins
description: Authenticate to container registries (GHCR by default, configure others as needed)

inputs:
  secret-method:
    description: 'Secret retrieval method (github, env)'
    required: false
    default: 'github'
  config:
    description: 'YAML config for registry logins (registry URL as key)'
    required: false
    default: ''
  secrets-json:
    description: 'JSON object containing secret values keyed by secret name'
    required: false
    default: '{}'
  docker-target-registry:
    description: 'Target registry to validate is configured (optional, but recommended for push workflows)'
    required: false
    default: ''
  # Build output
  output-sub-path:
    description: 'Build output directory (relative)'
    required: false
    default: 'kaptain-out'
  # Container runtime
  image-build-command:
    description: 'Container runtime command (podman or docker)'
    required: true

outputs:
  docker-push-image-list-file:
    description: 'Path to file listing image URIs for docker-push-all'
    value: ${{ steps.logins.outputs.DOCKER_PUSH_IMAGE_LIST_FILE }}

runs:
  using: composite
  steps:
    - name: Build config with GHCR default
      id: config
      shell: bash
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        GH_TOKEN: ${{ github.token }}
        GH_ACTOR: ${{ github.actor }}
      run: |
        USER_CONFIG='${{ inputs.config }}'

        # GHCR default config block as compact JSON, with token and actor
        # injected via jq --arg so values are always shell-safe.
        GHCR_DEFAULT=$(jq -n -c \
          --arg token "$GH_TOKEN" \
          --arg actor "$GH_ACTOR" \
          '{"ghcr.io": {type: "github-token", token: $token, actor: $actor}}')

        # USER_CONFIG arrives as compact JSON from load-final-kaptainpm-yaml
        # (.spec.main.docker.logins). Merge logic, all jq:
        if [[ -z "$USER_CONFIG" ]]; then
          # No user config - use GHCR default only
          FINAL_CONFIG="$GHCR_DEFAULT"
        elif echo "$USER_CONFIG" | jq -e 'has("ghcr.io")' > /dev/null 2>&1; then
          # User config already includes ghcr.io - use as-is
          FINAL_CONFIG="$USER_CONFIG"
        else
          # User config without ghcr.io - merge GHCR default in. Both are flat
          # objects keyed by registry URL with no overlap, so 'add' is enough.
          FINAL_CONFIG=$(jq -c -s 'add' <(echo "$GHCR_DEFAULT") <(echo "$USER_CONFIG"))
        fi

        # Validate docker-target-registry is configured (if provided)
        TARGET_REGISTRY='${{ inputs.docker-target-registry }}'
        if [[ -n "$TARGET_REGISTRY" ]]; then
          if ! echo "$FINAL_CONFIG" | jq -e --arg r "$TARGET_REGISTRY" 'has($r)' > /dev/null 2>&1; then
            echo "::error::Target registry '$TARGET_REGISTRY' is not configured in docker-registry-logins."
            echo "::error::Add '$TARGET_REGISTRY' to your docker-registry-logins config."
            exit 1
          fi
        fi

        # Export for next step. FINAL_CONFIG is single-line JSON so a plain
        # KEY=VALUE write is fine - no heredoc needed.
        echo "FINAL_CONFIG=$FINAL_CONFIG" >> "$GITHUB_OUTPUT"

    - name: Run docker-registry-logins
      id: logins
      shell: bash
      run: ${{ github.action_path }}/../../scripts/main/docker-registry-logins
      env:
        BUILD_MODE: build_server
        BUILD_PLATFORM: github-actions
        BUILD_PLATFORM_LOG_PROVIDER: github-actions
        SECRET_METHOD: ${{ inputs.secret-method }}
        DOCKER_REGISTRY_LOGINS: ${{ steps.config.outputs.FINAL_CONFIG }}
        SECRETS_JSON: ${{ inputs.secrets-json }}
        OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
        IMAGE_BUILD_COMMAND: ${{ inputs.image-build-command }}
