- name: Generate workload manifest
  id: generate-workload
  if: steps.kpm.outputs.KUBERNETES_WORKLOAD_TYPE != 'none'
  uses: ./.github/buildon-github-actions/src/actions/generate-kubernetes-workload
  with:
    # Required context
    project-name: ${{ steps.versions.outputs.project-name }}
    # Workload type
    kubernetes-workload-type: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_TYPE }}
    # Common workload settings
    kubernetes-workload-replicas: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_REPLICAS }}
    kubernetes-workload-revision-history-limit: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_REVISION_HISTORY_LIMIT }}
    kubernetes-workload-min-ready-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_MIN_READY_SECONDS }}
    kubernetes-workload-name-suffix: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_NAME_SUFFIX }}
    kubernetes-workload-combined-sub-path: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_COMBINED_SUB_PATH }}
    kubernetes-workload-env-sub-path: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_ENV_SUB_PATH }}
    kubernetes-workload-additional-labels: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_ADDITIONAL_LABELS }}
    kubernetes-workload-additional-annotations: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_ADDITIONAL_ANNOTATIONS }}
    # Container configuration
    kubernetes-workload-container-port: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_CONTAINER_PORT }}
    kubernetes-workload-container-command: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_CONTAINER_COMMAND }}
    kubernetes-workload-container-args: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_CONTAINER_ARGS }}
    kubernetes-workload-image-reference-style: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_IMAGE_REFERENCE_STYLE }}
    # Security settings
    kubernetes-workload-readonly-root-filesystem: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_READONLY_ROOT_FILESYSTEM }}
    kubernetes-workload-seccomp-profile: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_SECCOMP_PROFILE }}
    kubernetes-workload-automount-service-account-token: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_AUTOMOUNT_SERVICE_ACCOUNT_TOKEN }}
    kubernetes-workload-image-pull-secrets: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_IMAGE_PULL_SECRETS }}
    # Resource limits
    kubernetes-workload-resources-memory: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_RESOURCES_MEMORY }}
    kubernetes-workload-resources-cpu-request: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_RESOURCES_CPU_REQUEST }}
    kubernetes-workload-resources-cpu-limit: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_RESOURCES_CPU_LIMIT }}
    kubernetes-workload-resources-ephemeral-storage: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_RESOURCES_EPHEMERAL_STORAGE }}
    # Mount paths
    kubernetes-workload-configmap-mount-path: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_CONFIGMAP_MOUNT_PATH }}
    kubernetes-workload-secret-mount-path: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_SECRET_MOUNT_PATH }}
    # Environment variable refs from ConfigMap/Secret keys
    kubernetes-workload-configmap-keys-for-env: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_CONFIGMAP_KEYS_FOR_ENV }}
    kubernetes-workload-secret-keys-for-env: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_SECRET_KEYS_FOR_ENV }}
    # Lifecycle
    kubernetes-workload-termination-grace-period-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_TERMINATION_GRACE_PERIOD_SECONDS }}
    kubernetes-workload-prestop-command: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PRESTOP_COMMAND }}
    kubernetes-workload-affinity-strategy: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_AFFINITY_STRATEGY }}
    kubernetes-workload-tolerations: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_TOLERATIONS }}
    kubernetes-workload-node-selector: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_NODE_SELECTOR }}
    kubernetes-workload-dns-policy: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_DNS_POLICY }}
    kubernetes-workload-priority-class-name: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PRIORITY_CLASS_NAME }}
    # Liveness probe settings
    kubernetes-workload-probe-liveness-check-type: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_CHECK_TYPE }}
    kubernetes-workload-probe-liveness-http-path: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_HTTP_PATH }}
    kubernetes-workload-probe-liveness-http-scheme: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_HTTP_SCHEME }}
    kubernetes-workload-probe-liveness-tcp-port: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_TCP_PORT }}
    kubernetes-workload-probe-liveness-exec-command: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_EXEC_COMMAND }}
    kubernetes-workload-probe-liveness-grpc-port: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_GRPC_PORT }}
    kubernetes-workload-probe-liveness-grpc-service: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_GRPC_SERVICE }}
    kubernetes-workload-probe-liveness-initial-delay-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_INITIAL_DELAY_SECONDS }}
    kubernetes-workload-probe-liveness-period-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_PERIOD_SECONDS }}
    kubernetes-workload-probe-liveness-timeout-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_TIMEOUT_SECONDS }}
    kubernetes-workload-probe-liveness-failure-threshold: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_FAILURE_THRESHOLD }}
    kubernetes-workload-probe-liveness-termination-grace-period-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_LIVENESS_TERMINATION_GRACE_PERIOD_SECONDS }}
    # Readiness probe settings
    kubernetes-workload-probe-readiness-check-type: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_CHECK_TYPE }}
    kubernetes-workload-probe-readiness-http-path: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_HTTP_PATH }}
    kubernetes-workload-probe-readiness-http-scheme: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_HTTP_SCHEME }}
    kubernetes-workload-probe-readiness-tcp-port: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_TCP_PORT }}
    kubernetes-workload-probe-readiness-exec-command: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_EXEC_COMMAND }}
    kubernetes-workload-probe-readiness-grpc-port: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_GRPC_PORT }}
    kubernetes-workload-probe-readiness-grpc-service: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_GRPC_SERVICE }}
    kubernetes-workload-probe-readiness-initial-delay-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_INITIAL_DELAY_SECONDS }}
    kubernetes-workload-probe-readiness-period-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_PERIOD_SECONDS }}
    kubernetes-workload-probe-readiness-timeout-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_TIMEOUT_SECONDS }}
    kubernetes-workload-probe-readiness-failure-threshold: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_FAILURE_THRESHOLD }}
    kubernetes-workload-probe-readiness-success-threshold: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_READINESS_SUCCESS_THRESHOLD }}
    # Startup probe settings
    kubernetes-workload-probe-startup-check-type: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_CHECK_TYPE }}
    kubernetes-workload-probe-startup-http-path: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_HTTP_PATH }}
    kubernetes-workload-probe-startup-http-scheme: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_HTTP_SCHEME }}
    kubernetes-workload-probe-startup-tcp-port: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_TCP_PORT }}
    kubernetes-workload-probe-startup-exec-command: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_EXEC_COMMAND }}
    kubernetes-workload-probe-startup-grpc-port: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_GRPC_PORT }}
    kubernetes-workload-probe-startup-grpc-service: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_GRPC_SERVICE }}
    kubernetes-workload-probe-startup-initial-delay-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_INITIAL_DELAY_SECONDS }}
    kubernetes-workload-probe-startup-period-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_PERIOD_SECONDS }}
    kubernetes-workload-probe-startup-timeout-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_TIMEOUT_SECONDS }}
    kubernetes-workload-probe-startup-failure-threshold: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_FAILURE_THRESHOLD }}
    kubernetes-workload-probe-startup-termination-grace-period-seconds: ${{ steps.kpm.outputs.KUBERNETES_WORKLOAD_PROBE_STARTUP_TERMINATION_GRACE_PERIOD_SECONDS }}
    # StatefulSet-specific settings
    kubernetes-statefulset-service-name: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_SERVICE_NAME }}
    kubernetes-statefulset-env-sub-path: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_ENV_SUB_PATH }}
    kubernetes-statefulset-additional-labels: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_ADDITIONAL_LABELS }}
    kubernetes-statefulset-additional-annotations: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_ADDITIONAL_ANNOTATIONS }}
    kubernetes-statefulset-pod-management-policy: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_POD_MANAGEMENT_POLICY }}
    kubernetes-statefulset-allow-unreliable-pod-management-policy: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_ALLOW_UNRELIABLE_POD_MANAGEMENT_POLICY }}
    kubernetes-statefulset-update-strategy-type: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_UPDATE_STRATEGY_TYPE }}
    kubernetes-statefulset-update-strategy-partition: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_UPDATE_STRATEGY_PARTITION }}
    kubernetes-statefulset-pvc-enabled: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_PVC_ENABLED }}
    kubernetes-statefulset-pvc-storage-class: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_PVC_STORAGE_CLASS }}
    kubernetes-statefulset-pvc-storage-size: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_PVC_STORAGE_SIZE }}
    kubernetes-statefulset-pvc-access-mode: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_PVC_ACCESS_MODE }}
    kubernetes-statefulset-pvc-volume-name: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_PVC_VOLUME_NAME }}
    kubernetes-statefulset-pvc-mount-path: ${{ steps.kpm.outputs.KUBERNETES_STATEFULSET_PVC_MOUNT_PATH }}
    # DaemonSet-specific settings
    kubernetes-daemonset-update-strategy-type: ${{ steps.kpm.outputs.KUBERNETES_DAEMONSET_UPDATE_STRATEGY_TYPE }}
    kubernetes-daemonset-max-unavailable: ${{ steps.kpm.outputs.KUBERNETES_DAEMONSET_MAX_UNAVAILABLE }}
    kubernetes-daemonset-host-network: ${{ steps.kpm.outputs.KUBERNETES_DAEMONSET_HOST_NETWORK }}
    kubernetes-daemonset-host-pid: ${{ steps.kpm.outputs.KUBERNETES_DAEMONSET_HOST_PID }}
    kubernetes-daemonset-host-ipc: ${{ steps.kpm.outputs.KUBERNETES_DAEMONSET_HOST_IPC }}
    kubernetes-daemonset-run-as-non-root: ${{ steps.kpm.outputs.KUBERNETES_DAEMONSET_RUN_AS_NON_ROOT }}
    kubernetes-daemonset-privileged: ${{ steps.kpm.outputs.KUBERNETES_DAEMONSET_PRIVILEGED }}
    kubernetes-daemonset-dns-policy: ${{ steps.kpm.outputs.KUBERNETES_DAEMONSET_DNS_POLICY }}
    kubernetes-daemonset-tolerations: ${{ steps.kpm.outputs.KUBERNETES_DAEMONSET_TOLERATIONS }}
    kubernetes-daemonset-node-selector: ${{ steps.kpm.outputs.KUBERNETES_DAEMONSET_NODE_SELECTOR }}
    # Deployment-specific settings
    kubernetes-deployment-env-sub-path: ${{ steps.kpm.outputs.KUBERNETES_DEPLOYMENT_ENV_SUB_PATH }}
    kubernetes-deployment-additional-labels: ${{ steps.kpm.outputs.KUBERNETES_DEPLOYMENT_ADDITIONAL_LABELS }}
    kubernetes-deployment-additional-annotations: ${{ steps.kpm.outputs.KUBERNETES_DEPLOYMENT_ADDITIONAL_ANNOTATIONS }}
    kubernetes-deployment-max-surge: ${{ steps.kpm.outputs.KUBERNETES_DEPLOYMENT_MAX_SURGE }}
    kubernetes-deployment-max-unavailable: ${{ steps.kpm.outputs.KUBERNETES_DEPLOYMENT_MAX_UNAVAILABLE }}
    # Job-specific settings
    kubernetes-job-name-suffix: ${{ steps.kpm.outputs.KUBERNETES_JOB_NAME_SUFFIX }}
    kubernetes-job-combined-sub-path: ${{ steps.kpm.outputs.KUBERNETES_JOB_COMBINED_SUB_PATH }}
    kubernetes-job-backoff-limit: ${{ steps.kpm.outputs.KUBERNETES_JOB_BACKOFF_LIMIT }}
    kubernetes-job-completions: ${{ steps.kpm.outputs.KUBERNETES_JOB_COMPLETIONS }}
    kubernetes-job-parallelism: ${{ steps.kpm.outputs.KUBERNETES_JOB_PARALLELISM }}
    kubernetes-job-active-deadline-seconds: ${{ steps.kpm.outputs.KUBERNETES_JOB_ACTIVE_DEADLINE_SECONDS }}
    kubernetes-job-ttl-seconds-after-finished: ${{ steps.kpm.outputs.KUBERNETES_JOB_TTL_SECONDS_AFTER_FINISHED }}
    kubernetes-job-restart-policy: ${{ steps.kpm.outputs.KUBERNETES_JOB_RESTART_POLICY }}
    kubernetes-job-env-sub-path: ${{ steps.kpm.outputs.KUBERNETES_JOB_ENV_SUB_PATH }}
    kubernetes-job-additional-labels: ${{ steps.kpm.outputs.KUBERNETES_JOB_ADDITIONAL_LABELS }}
    kubernetes-job-additional-annotations: ${{ steps.kpm.outputs.KUBERNETES_JOB_ADDITIONAL_ANNOTATIONS }}
    kubernetes-job-liveness-probe-enabled: ${{ steps.kpm.outputs.KUBERNETES_JOB_LIVENESS_PROBE_ENABLED }}
    kubernetes-job-readiness-probe-enabled: ${{ steps.kpm.outputs.KUBERNETES_JOB_READINESS_PROBE_ENABLED }}
    kubernetes-job-startup-probe-enabled: ${{ steps.kpm.outputs.KUBERNETES_JOB_STARTUP_PROBE_ENABLED }}
    # CronJob-specific settings
    kubernetes-cronjob-name-suffix: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_NAME_SUFFIX }}
    kubernetes-cronjob-combined-sub-path: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_COMBINED_SUB_PATH }}
    kubernetes-cronjob-concurrency-policy: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_CONCURRENCY_POLICY }}
    kubernetes-cronjob-starting-deadline-seconds: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_STARTING_DEADLINE_SECONDS }}
    kubernetes-cronjob-successful-jobs-history-limit: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_SUCCESSFUL_JOBS_HISTORY_LIMIT }}
    kubernetes-cronjob-failed-jobs-history-limit: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_FAILED_JOBS_HISTORY_LIMIT }}
    kubernetes-cronjob-backoff-limit: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_BACKOFF_LIMIT }}
    kubernetes-cronjob-completions: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_COMPLETIONS }}
    kubernetes-cronjob-parallelism: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_PARALLELISM }}
    kubernetes-cronjob-active-deadline-seconds: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_ACTIVE_DEADLINE_SECONDS }}
    kubernetes-cronjob-restart-policy: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_RESTART_POLICY }}
    kubernetes-cronjob-env-sub-path: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_ENV_SUB_PATH }}
    kubernetes-cronjob-additional-labels: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_ADDITIONAL_LABELS }}
    kubernetes-cronjob-additional-annotations: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_ADDITIONAL_ANNOTATIONS }}
    kubernetes-cronjob-liveness-probe-enabled: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_LIVENESS_PROBE_ENABLED }}
    kubernetes-cronjob-readiness-probe-enabled: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_READINESS_PROBE_ENABLED }}
    kubernetes-cronjob-startup-probe-enabled: ${{ steps.kpm.outputs.KUBERNETES_CRONJOB_STARTUP_PROBE_ENABLED }}
    # Global settings
    output-sub-path: ${{ steps.kpm.outputs.OUTPUT_SUB_PATH }}
    token-name-style: ${{ steps.kpm.outputs.TOKEN_NAME_STYLE }}
    token-delimiter-style: ${{ steps.kpm.outputs.TOKEN_DELIMITER_STYLE }}
    token-name-validation: ${{ steps.kpm.outputs.TOKEN_NAME_VALIDATION }}
    allow-builtin-token-override: ${{ steps.kpm.outputs.ALLOW_BUILTIN_TOKEN_OVERRIDE }}
    config-sub-path: ${{ steps.kpm.outputs.CONFIG_SUB_PATH }}
    config-value-trailing-newline: ${{ steps.kpm.outputs.CONFIG_VALUE_TRAILING_NEWLINE }}
    token-substitution-passes: ${{ steps.kpm.outputs.TOKEN_SUBSTITUTION_PASSES }}
    kubernetes-global-additional-labels: ${{ steps.kpm.outputs.KUBERNETES_GLOBAL_ADDITIONAL_LABELS }}
    kubernetes-global-additional-annotations: ${{ steps.kpm.outputs.KUBERNETES_GLOBAL_ADDITIONAL_ANNOTATIONS }}
