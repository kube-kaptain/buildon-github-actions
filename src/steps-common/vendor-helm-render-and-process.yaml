- name: Vendor helm render and process
  id: vendor-helm-render-and-process
  uses: ./.github/buildon-github-actions/src/actions/vendor-helm-render-and-process
  with:
    output-sub-path: ${{ steps.kpm.outputs.OUTPUT_SUB_PATH }}
    vendor-helm-rendered-repo-url: ${{ steps.kpm.outputs.VENDOR_HELM_RENDERED_REPO_URL }}
    vendor-helm-rendered-chart-name: ${{ steps.kpm.outputs.VENDOR_HELM_RENDERED_CHART_NAME }}
    vendor-helm-rendered-oci-chart: ${{ steps.kpm.outputs.VENDOR_HELM_RENDERED_OCI_CHART }}
    vendor-helm-rendered-move-files: ${{ steps.kpm.outputs.VENDOR_HELM_RENDERED_MOVE_FILES }}
    vendor-helm-rendered-sed-replace: ${{ steps.kpm.outputs.VENDOR_HELM_RENDERED_SED_REPLACE }}
    vendor-helm-rendered-yq-transform: ${{ steps.kpm.outputs.VENDOR_HELM_RENDERED_YQ_TRANSFORM }}
    vendor-helm-rendered-image-retags: ${{ steps.kpm.outputs.VENDOR_HELM_RENDERED_IMAGE_RETAGS }}
    vendor-helm-rendered-use-project-name-as-fullname-override: ${{ steps.kpm.outputs.VENDOR_HELM_RENDERED_USE_PROJECT_NAME_AS_FULLNAME_OVERRIDE }}
    project-name: ${{ steps.versions.outputs.project-name }}
    docker-tag: ${{ steps.versions.outputs.docker-tag }}
    docker-image-name: ${{ steps.versions.outputs.docker-image-name }}
    docker-image-name-override: ${{ steps.kpm.outputs.DOCKER_IMAGE_NAME_OVERRIDE }}
    docker-push-image-list-file: ${{ steps.docker-registry-logins.outputs.docker-push-image-list-file }}
    docker-target-registry: ${{ steps.resolve-registry.outputs.docker-target-registry }}
    docker-target-namespace: ${{ steps.resolve-registry.outputs.docker-target-namespace }}
    image-build-command: ${{ steps.validate-tooling.outputs.IMAGE_BUILD_COMMAND }}
    docker-platform: ${{ steps.kpm.outputs.DOCKER_PLATFORM }}
