- name: Prepare layer package
  id: layer-package-prepare
  uses: ./.github/buildon-github-actions/src/actions/layer-package-prepare
  with:
    project-name: ${{ steps.versions.outputs.project-name }}
    version: ${{ steps.versions.outputs.version }}
    repository-owner: ${{ steps.versions.outputs.repository-owner }}
    repository-name: ${{ steps.versions.outputs.repository-name }}
    output-sub-path: ${{ steps.kpm.outputs.OUTPUT_SUB_PATH }}
    docker-target-registry: ${{ steps.resolve-registry.outputs.docker-target-registry }}
    docker-target-namespace: ${{ steps.resolve-registry.outputs.docker-target-namespace }}
    layer-packaging-base-image: ${{ steps.kpm.outputs.LAYER_PACKAGING_BASE_IMAGE }}
