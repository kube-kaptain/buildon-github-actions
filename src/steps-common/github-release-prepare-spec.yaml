# Build full spec file paths from the substituted docker context
- name: Resolve internal release files
  id: resolve-internal-release-files
  if: inputs.github-release-enabled == true
  shell: bash
  env:
    OUTPUT_SUB_PATH: ${{ inputs.output-sub-path }}
    DOCKER_PLATFORM: ${{ inputs.docker-platform }}
    SPEC_SUBSTITUTED_FILES: ${{ steps.spec-package-prepare.outputs.SPEC_SUBSTITUTED_FILES }}
  run: |
    set -euo pipefail
    if [[ "${DOCKER_PLATFORM}" == *,* ]]; then
      CONTEXT_DIR="${OUTPUT_SUB_PATH}/docker-linux-amd64/substituted"
    else
      CONTEXT_DIR="${OUTPUT_SUB_PATH}/docker/substituted"
    fi
    full_paths=""
    IFS=',' read -ra files <<< "${SPEC_SUBSTITUTED_FILES}"
    for rel_path in "${files[@]}"; do
      if [[ -n "${full_paths}" ]]; then
        full_paths="${full_paths},${CONTEXT_DIR}/${rel_path}"
      else
        full_paths="${CONTEXT_DIR}/${rel_path}"
      fi
    done
    echo "verbatim-files=${full_paths}" >> "${GITHUB_OUTPUT}"
    echo "substituted-files=" >> "${GITHUB_OUTPUT}"
    echo "raw-files=" >> "${GITHUB_OUTPUT}"

- name: Prepare release files
  id: github-release-prepare
  if: inputs.github-release-enabled == true
  uses: ./.github/buildon-github-actions/src/actions/github-release-prepare
  with:
    github-release-substituted-files: ${{ inputs.github-release-substituted-files }}
    github-release-verbatim-files: ${{ inputs.github-release-verbatim-files }}
    github-release-raw-files: ${{ inputs.github-release-raw-files }}
    internal-verbatim-files: >-
      ${{ inputs.output-sub-path }}/release-change-data/release-change-data.yaml,
      ${{ steps.resolve-internal-release-files.outputs.verbatim-files }}
    internal-substituted-files: ${{ steps.resolve-internal-release-files.outputs.substituted-files }}
    internal-raw-files: ${{ steps.resolve-internal-release-files.outputs.raw-files }}
    output-sub-path: ${{ inputs.output-sub-path }}
    version: ${{ steps.versions.outputs.version }}
    project-name: ${{ steps.versions.outputs.project-name }}
    docker-tag: ${{ steps.versions.outputs.docker-tag }}
    docker-image-name: ${{ steps.versions.outputs.docker-image-name }}
    is-release: ${{ steps.versions.outputs.is-release }}
    github-release-add-version-to-filenames: ${{ inputs.github-release-add-version-to-filenames }}
    token-delimiter-style: ${{ inputs.token-delimiter-style }}
    token-name-style: ${{ inputs.token-name-style }}
    token-name-validation: ${{ inputs.token-name-validation }}
    config-sub-path: ${{ inputs.config-sub-path }}
    allow-builtin-token-override: ${{ inputs.allow-builtin-token-override }}
    config-value-trailing-newline: ${{ inputs.config-value-trailing-newline }}
    token-substitution-passes: ${{ inputs.token-substitution-passes }}
    docker-image-full-uri: ${{ steps.docker-build.outputs.docker-target-image-full-uri }}
    docker-target-registry: ${{ steps.resolve-registry.outputs.docker-target-registry }}
    docker-target-namespace: ${{ steps.resolve-registry.outputs.docker-target-namespace }}
