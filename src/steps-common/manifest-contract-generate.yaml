- name: Generate manifests contract
  id: manifest-contract-generate
  uses: ./.github/buildon-github-actions/src/actions/kubernetes-manifests-contract-generate
  with:
    project-name: ${{ steps.versions.outputs.project-name }}
    version: ${{ steps.versions.outputs.version }}
    build-kind: ${WORKFLOW_NAME}
    token-delimiter-style: ${{ steps.kpm.outputs.TOKEN_DELIMITER_STYLE }}
    token-name-style: ${{ steps.kpm.outputs.TOKEN_NAME_STYLE }}
    metadata-description: ${{ steps.kpm.outputs.METADATA_DESCRIPTION }}
    defaults-sub-path: ${{ steps.kpm.outputs.DEFAULTS_SUB_PATH }}
    output-sub-path: ${{ steps.kpm.outputs.OUTPUT_SUB_PATH }}
