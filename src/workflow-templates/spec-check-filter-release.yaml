      # === Change Source Note ===
      # INJECT: github-check-start(name="Change Source Note", id="check-change-source-note", if="steps.versions.outputs.is-release != 'true'")
      # INJECT: change-source-note-write
      # INJECT: github-check-end(name="Change Source Note", id="check-change-source-note", if="steps.versions.outputs.is-release != 'true'")

      # === Release Change Data Generate ===
      # INJECT: github-check-start(name="Release Change Data Generate", id="check-release-change-data-generate")
      # INJECT: release-change-data-generate
      # INJECT: github-check-end(name="Release Change Data Generate", id="check-release-change-data-generate")

      # === Release Change Data OCI Package ===
      # INJECT: github-check-start(name="Release Change Data OCI Package", id="check-release-change-data-oci-package")
      # INJECT: release-change-data-oci-package
      # INJECT: github-check-end(name="Release Change Data OCI Package", id="check-release-change-data-oci-package")

      # === Pre-docker Prepare ===
      # INJECT: github-check-start(name="Pre-docker Prepare", id="check-pre-docker-prepare", if="steps.kpm.outputs.HOOK_PRE_DOCKER_PREPARE_SCRIPT_SUB_PATH != ''")
      # INJECT: hook-pre-docker-prepare
      # INJECT: github-check-end(name="Pre-docker Prepare", id="check-pre-docker-prepare", if="steps.kpm.outputs.HOOK_PRE_DOCKER_PREPARE_SCRIPT_SUB_PATH != ''")

      # === Spec Package Prepare ===
      # INJECT: github-check-start(name="Spec Package Prepare", id="check-spec-prepare")
      - name: Spec package prepare
        id: spec-package-prepare
        shell: bash
        env:
          PROJECT_NAME: ${{ steps.versions.outputs.project-name }}
          VERSION: ${{ steps.versions.outputs.version }}
          OUTPUT_SUB_PATH: ${{ steps.kpm.outputs.OUTPUT_SUB_PATH }}
          SPEC_PACKAGING_BASE_IMAGE: ${{ steps.kpm.outputs.SPEC_PACKAGING_BASE_IMAGE }}
          BUILD_PLATFORM: github-actions
          BUILD_PLATFORM_LOG_PROVIDER: github-actions
        run: ./.github/buildon-github-actions/src/scripts/main/spec-package-prepare
      # INJECT: github-check-end(name="Spec Package Prepare", id="check-spec-prepare")

      # === Docker Build ===
      # INJECT: github-check-start(name="Docker Build", id="check-docker-build")
      - name: Build image
        id: docker-build
        uses: ./.github/buildon-github-actions/src/actions/docker-build-dockerfile
        with:
          image-build-command: ${{ steps.validate-tooling.outputs.IMAGE_BUILD_COMMAND }}
          docker-target-registry: ${{ steps.resolve-registry.outputs.docker-target-registry }}
          docker-target-namespace: ${{ steps.resolve-registry.outputs.docker-target-namespace }}
          docker-image-name: ${{ steps.versions.outputs.docker-image-name }}
          docker-tag: ${{ steps.versions.outputs.docker-tag }}
          version: ${{ steps.versions.outputs.version }}
          project-name: ${{ steps.versions.outputs.project-name }}
          is-release: ${{ steps.versions.outputs.is-release }}
          repository-owner: ${{ steps.versions.outputs.repository-owner }}
          repository-name: ${{ steps.versions.outputs.repository-name }}
          dockerfile-sub-path: ${{ steps.spec-package-prepare.outputs.DOCKERFILE_SUB_PATH }}
          dockerfile-substitution-files: ${{ steps.spec-package-prepare.outputs.SPEC_DOCKER_FILES }}
          dockerfile-squash: ${{ steps.kpm.outputs.DOCKERFILE_SQUASH }}
          dockerfile-no-cache: ${{ steps.kpm.outputs.DOCKERFILE_NO_CACHE }}
          output-sub-path: ${{ steps.kpm.outputs.OUTPUT_SUB_PATH }}
          docker-push-image-list-file: ${{ steps.docker-registry-logins.outputs.docker-push-image-list-file }}
          token-delimiter-style: ${{ steps.kpm.outputs.TOKEN_DELIMITER_STYLE }}
          token-name-style: ${{ steps.kpm.outputs.TOKEN_NAME_STYLE }}
          token-name-validation: ${{ steps.kpm.outputs.TOKEN_NAME_VALIDATION }}
          config-sub-path: ${{ steps.kpm.outputs.CONFIG_SUB_PATH }}
          allow-builtin-token-override: ${{ steps.kpm.outputs.ALLOW_BUILTIN_TOKEN_OVERRIDE }}
          config-value-trailing-newline: ${{ steps.kpm.outputs.CONFIG_VALUE_TRAILING_NEWLINE }}
          token-substitution-passes: ${{ steps.kpm.outputs.TOKEN_SUBSTITUTION_PASSES }}
          docker-platform: ${{ steps.kpm.outputs.DOCKER_PLATFORM }}
          dockerfile-sub-path-linux-amd64: ${{ steps.spec-package-prepare.outputs.DOCKERFILE_SUB_PATH_LINUX_AMD64 }}
          dockerfile-sub-path-linux-arm64: ${{ steps.spec-package-prepare.outputs.DOCKERFILE_SUB_PATH_LINUX_ARM64 }}
      # INJECT: github-check-end(name="Docker Build", id="check-docker-build")

      # === Spec Validate ===
      # INJECT: github-check-start(name="Spec Validate", id="check-spec-validate")
      - name: Spec validate
        id: spec-validate
        shell: bash
        env:
          SPEC_TYPE: ${{ steps.kpm.outputs.SPEC_TYPE }}
          SPEC_JSON_SCHEMA_URL: ${{ steps.kpm.outputs.SPEC_JSON_SCHEMA_URL }}
          OUTPUT_SUB_PATH: ${{ steps.kpm.outputs.OUTPUT_SUB_PATH }}
          DOCKER_PLATFORM: ${{ steps.kpm.outputs.DOCKER_PLATFORM }}
          IMAGE_BUILD_COMMAND: ${{ steps.validate-tooling.outputs.IMAGE_BUILD_COMMAND }}
          BUILD_PLATFORM: github-actions
          BUILD_PLATFORM_LOG_PROVIDER: github-actions
        run: ./.github/buildon-github-actions/src/scripts/main/spec-validate
      # INJECT: github-check-end(name="Spec Validate", id="check-spec-validate")

      # === Post-docker Tests ===
      # INJECT: github-check-start(name="Post-docker Tests", id="check-post-docker", if="steps.kpm.outputs.HOOK_POST_DOCKER_TESTS_SCRIPT_SUB_PATH != ''")
      # INJECT: hook-post-docker-tests
      # INJECT: github-check-end(name="Post-docker Tests", id="check-post-docker", if="steps.kpm.outputs.HOOK_POST_DOCKER_TESTS_SCRIPT_SUB_PATH != ''")

      # === Docker Multi-Tag ===
      # INJECT: github-check-start(name="Docker Multi-Tag", id="check-docker-multi-tag", if="steps.kpm.outputs.DOCKER_PUSH_TARGETS != '' && steps.versions.outputs.is-release == 'true'")
      # INJECT: docker-multi-tag
      # INJECT: github-check-end(name="Docker Multi-Tag", id="check-docker-multi-tag", if="steps.kpm.outputs.DOCKER_PUSH_TARGETS != '' && steps.versions.outputs.is-release == 'true'")

      # === GitHub Release Prepare ===
      # INJECT: github-check-start(name="GitHub Release Prepare", id="check-github-release-prepare", if="steps.kpm.outputs.GITHUB_RELEASE_ENABLED == 'true'")
      # INJECT: github-release-prepare-spec
      # INJECT: github-check-end(name="GitHub Release Prepare", id="check-github-release-prepare", if="steps.kpm.outputs.GITHUB_RELEASE_ENABLED == 'true'")

      # === Git Tag Push ===
      # INJECT: github-check-start(name="Git Tag Push", id="check-git-push-tag", if="steps.versions.outputs.is-release == 'true'")
      # INJECT: git-push-tag
      # INJECT: github-check-end(name="Git Tag Push", id="check-git-push-tag", if="steps.versions.outputs.is-release == 'true'")

      # === Docker Push All ===
      # INJECT: github-check-start(name="Docker Push All", id="check-docker-push-all", if="steps.versions.outputs.is-release == 'true'")
      # INJECT: docker-push-all
      # INJECT: github-check-end(name="Docker Push All", id="check-docker-push-all", if="steps.versions.outputs.is-release == 'true'")

      # === GitHub Release ===
      # INJECT: github-check-start(name="GitHub Release", id="check-github-release", if="steps.kpm.outputs.GITHUB_RELEASE_ENABLED == 'true' && steps.versions.outputs.is-release == 'true'")
      # INJECT: github-release-spec
      # INJECT: github-check-end(name="GitHub Release", id="check-github-release", if="steps.kpm.outputs.GITHUB_RELEASE_ENABLED == 'true' && steps.versions.outputs.is-release == 'true'")

      # === Post-Build ===
