name: Spec Check Filter Release
kaptain-order: 90
kaptain-description: Everything from quality and version above, but also validates and packages a JSON Schema or an API Spec
on:
  workflow_call:
    secrets:
      docker-registry-logins-secrets:
        description: 'JSON object of secrets for docker-registry-logins (e.g., {"DOCKER_USER": "x", "DOCKER_PASS": "y"})'
        required: false
    outputs:
      # Version outputs
      version:
        description: 'The generated version'
        value: ${{ jobs.build.outputs.version }}
      version-major:
        description: 'Major version number'
        value: ${{ jobs.build.outputs.version-major }}
      version-minor:
        description: 'Minor version number'
        value: ${{ jobs.build.outputs.version-minor }}
      version-patch:
        description: 'Patch version number'
        value: ${{ jobs.build.outputs.version-patch }}
      version-2-part:
        description: 'Version padded/truncated to 2 parts'
        value: ${{ jobs.build.outputs.version-2-part }}
      version-3-part:
        description: 'Version padded/truncated to 3 parts'
        value: ${{ jobs.build.outputs.version-3-part }}
      version-4-part:
        description: 'Version padded/truncated to 4 parts'
        value: ${{ jobs.build.outputs.version-4-part }}
      docker-tag:
        description: 'Tag for Docker images'
        value: ${{ jobs.build.outputs.docker-tag }}
      docker-image-name:
        description: 'Docker image name'
        value: ${{ jobs.build.outputs.docker-image-name }}
      git-tag:
        description: 'Tag for git'
        value: ${{ jobs.build.outputs.git-tag }}
      project-name:
        description: 'The repository/project name'
        value: ${{ jobs.build.outputs.project-name }}
      is-release:
        description: 'Whether this is a release build'
        value: ${{ jobs.build.outputs.is-release }}
      # Build outputs
      docker-target-image-full-uri:
        description: 'Full target image reference'
        value: ${{ jobs.build.outputs.docker-target-image-full-uri }}
      images-pushed:
        description: 'Number of images pushed'
        value: ${{ jobs.build.outputs.images-pushed }}
jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      checks: write
    outputs:
      version: ${{ steps.versions.outputs.version }}
      version-major: ${{ steps.versions.outputs.version-major }}
      version-minor: ${{ steps.versions.outputs.version-minor }}
      version-patch: ${{ steps.versions.outputs.version-patch }}
      version-2-part: ${{ steps.versions.outputs.version-2-part }}
      version-3-part: ${{ steps.versions.outputs.version-3-part }}
      version-4-part: ${{ steps.versions.outputs.version-4-part }}
      docker-tag: ${{ steps.versions.outputs.docker-tag }}
      docker-image-name: ${{ steps.versions.outputs.docker-image-name }}
      git-tag: ${{ steps.versions.outputs.git-tag }}
      project-name: ${{ steps.versions.outputs.project-name }}
      is-release: ${{ steps.versions.outputs.is-release }}
      docker-target-image-full-uri: ${{ steps.docker-build.outputs.docker-target-image-full-uri }}
      images-pushed: ${{ steps.docker-push-all.outputs.images-pushed }}
      docker-context-sub-path: ${{ steps.kpm.outputs.OUTPUT_SUB_PATH }}/docker/substituted
    steps:
      # INJECT: parse-workflow-ref-and-checkout

      # === Validate Tooling ===
      # INJECT: github-check-start(name="Validate Tooling", id="check-validate-tooling")
      # INJECT: validate-tooling
      # INJECT: github-check-end(name="Validate Tooling", id="check-validate-tooling")

      # === Load Project KaptainPM Docker Logins ===
      # INJECT: github-check-start(name="Load Project KaptainPM Docker Logins", id="check-load-project-kpm")
      # INJECT: load-project-kaptainpm-docker-logins
      # INJECT: github-check-end(name="Load Project KaptainPM Docker Logins", id="check-load-project-kpm")

      # === Pre-Init Docker Registry Logins ===
      # INJECT: github-check-start(name="Pre-Init Docker Registry Logins", id="check-docker-registry-logins-pre-init")
      # INJECT: docker-registry-logins-pre-init
      # INJECT: github-check-end(name="Pre-Init Docker Registry Logins", id="check-docker-registry-logins-pre-init")

      # === Kaptain Init ===
      # INJECT: github-check-start(name="Kaptain Init", id="check-kaptain-init")
      # INJECT: kaptain-init
      # INJECT: github-check-end(name="Kaptain Init", id="check-kaptain-init")

      # === Load Final KaptainPM YAML ===
      # INJECT: github-check-start(name="Load Final KaptainPM YAML", id="check-load-final-kpm")
      # INJECT: load-final-kaptainpm-yaml
      # INJECT: github-check-end(name="Load Final KaptainPM YAML", id="check-load-final-kpm")

      # === Pre-Build ===
      # INJECT: github-check-start(name="Pre-Build", id="check-pre-build", if="steps.kpm.outputs.HOOK_PRE_BUILD_SCRIPT_SUB_PATH != ''")
      # INJECT: hook-pre-build
      # INJECT: github-check-end(name="Pre-Build", id="check-pre-build", if="steps.kpm.outputs.HOOK_PRE_BUILD_SCRIPT_SUB_PATH != ''")

      # === Basic Quality Checks ===
      # INJECT: github-check-start(name="Basic Quality Checks", id="check-basic-quality", if="github.event_name == 'pull_request'")
      # INJECT: basic-quality-checks
      # INJECT: github-check-end(name="Basic Quality Checks", id="check-basic-quality", if="github.event_name == 'pull_request'")

      # === Resolve Registry ===
      # INJECT: resolve-registry-and-namespace

      # === Docker Registry Logins ===
      # INJECT: github-check-start(name="Docker Registry Logins", id="check-docker-registry-logins")
      # INJECT: docker-registry-logins
      # INJECT: github-check-end(name="Docker Registry Logins", id="check-docker-registry-logins")

      # === Docker Platform Setup ===
      # INJECT: github-check-start(name="Docker Platform Setup", id="check-docker-platform-setup")
      # INJECT: docker-platform-setup
      # INJECT: github-check-end(name="Docker Platform Setup", id="check-docker-platform-setup")

      # === Pre-tagging Tests ===
      # INJECT: github-check-start(name="Pre-tagging Tests", id="check-pre-tagging", if="steps.kpm.outputs.HOOK_PRE_TAGGING_TESTS_SCRIPT_SUB_PATH != ''")
      # INJECT: hook-pre-tagging-tests
      # INJECT: github-check-end(name="Pre-tagging Tests", id="check-pre-tagging", if="steps.kpm.outputs.HOOK_PRE_TAGGING_TESTS_SCRIPT_SUB_PATH != ''")

      # === Versions & Naming ===
      # INJECT: github-check-start(name="Versions & Naming", id="check-versions")
      # INJECT: versions-and-naming
      # INJECT: github-check-end(name="Versions & Naming", id="check-versions")

